<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>차트</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --primary:#3182f6;
    --primary-dark:#1b64da;
    --primary-light:#eaf2ff;
    --accent:#00c2b3;
    --accent-light:#e3faf7;
    --danger:#f04452;
    --danger-light:#fef0f1;
    --bg:#f2f4f6;
    --card:#ffffff;
    --border:#f2f4f6;
    --text:#191f28;
    --muted:#8b95a1;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:'Noto Sans KR',sans-serif;
    background:var(--bg);
    color:var(--text);
    padding:20px;
    -webkit-font-smoothing:antialiased;
  }
  .container{max-width:1680px;margin:0 auto;}
  .page-tabs{
    display:flex;gap:6px;margin:0 0 20px;
    border-bottom:2px solid var(--border);
    position:sticky;top:0;z-index:200;
    background:var(--bg);padding-top:8px;
  }
  .page-tab{
    padding:12px 24px;background:transparent;border:none;
    font-size:16px;font-weight:800;color:var(--muted);
    cursor:pointer;border-bottom:3px solid transparent;
    margin-bottom:-2px;letter-spacing:-0.02em;
    font-family:inherit;
  }
  .page-tab:hover{color:var(--text);}
  .page-tab.active{color:var(--primary);border-bottom-color:var(--primary);}
  .page-content{display:none;}
  .p-reset-row{display:flex;justify-content:flex-end;margin-top:14px;}
  .p-reset-btn{
    padding:8px 18px;font-size:12.5px;font-weight:700;
    background:var(--danger-light);color:var(--danger);
    border:none;border-radius:10px;cursor:pointer;font-family:inherit;
  }
  .p-reset-btn:hover{background:#fddfe2;}
  .page-content.active{display:block;}
  .deliver-toprow{display:flex;gap:10px;margin-bottom:16px;}
  .deliver-input{
    flex:1;border:none;border-radius:12px;padding:12px 14px;
    font-size:15px;font-family:inherit;background:#f2f4f6;color:var(--text);font-weight:600;
  }
  .deliver-input:focus{outline:none;background:#f2f4f6;box-shadow:none;}
  .deliver-chips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px;min-height:4px;}
  .deliver-btns{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px;padding-top:14px;border-top:1px solid var(--border);}
  .dv-btn{
    height:36px;padding:0 14px;border:1px solid var(--border);
    background:#fff;color:var(--text-secondary);border-radius:8px;
    font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s;
  }
  .dv-btn:hover{border-color:var(--dvcolor);color:var(--dvcolor);}
  .dv-chip{
    display:flex;align-items:center;height:36px;gap:6px;padding:0 12px;
    border-radius:8px;font-size:13px;font-weight:600;color:#fff;background:var(--dvcolor);white-space:nowrap;
  }
  .dv-chip .dv-del{cursor:pointer;opacity:0.85;font-size:12px;padding:2px 2px;}
  .dv-chip .dv-del:hover{opacity:1;}
  .dv-chip-split{
    display:flex;align-items:stretch;height:36px;padding:0;border-radius:8px;overflow:hidden;
  }
  .dv-chip-split .dv-label{background:var(--dvcolor);color:#fff;font-weight:600;font-size:13px;padding:0 10px;display:flex;align-items:center;white-space:nowrap;}
  .dv-chip-split input{border:none;background:var(--dvcolor);font-size:13px;padding:0 6px;width:56px;color:#fff;font-family:inherit;}
  .dv-chip-split input::placeholder{color:rgba(255,255,255,0.7);}
  .dv-chip-split input:focus{outline:none;background:var(--dvcolor) !important;box-shadow:none !important;filter:none !important;}
  .dv-chip-split select{border:none;background:var(--dvcolor);font-size:12px;font-weight:500;padding:0 6px;color:#fff;cursor:pointer;font-family:inherit;border-left:1px solid rgba(255,255,255,0.2);}
  .dv-chip-split select:focus{outline:none;background:var(--dvcolor) !important;filter:none !important;}
  .dv-chip-split .dv-del{background:var(--dvcolor);display:flex;align-items:center;padding:0 10px;cursor:pointer;color:rgba(255,255,255,0.85);font-size:12px;border-left:1px solid rgba(255,255,255,0.2);}
  .dv-chip-split .dv-del:hover{color:#fff;}
  .dv-chip.dv-dragging, .dv-chip-split.dv-dragging{opacity:0.4;}
  .dv-chip, .dv-chip-split{cursor:grab;}
  .dv-chip:active, .dv-chip-split:active{cursor:grabbing;}
  .deliver-actions{display:flex;gap:10px;margin-bottom:14px;}
  .deliver-result{
    width:100%;min-height:80px;border:none;border-radius:12px;padding:14px;
    font-size:15px;font-family:inherit;background:#f2f4f6;color:var(--text);resize:vertical;line-height:1.6;font-weight:600;
  }
  .deliver-result:focus{outline:none;}
  .deliver-result::placeholder{font-weight:400;font-size:12.5px;color:var(--muted);}
  .skin-layout{
    display:grid;grid-template-columns:1.7fr 1fr;gap:16px;align-items:start;
  }
  .skin-output-card{position:sticky;top:16px;}
  .skin-grid{
    display:grid;grid-template-columns:1fr 1fr;gap:20px;align-items:start;
  }
  @media (max-width:900px){
    .skin-layout{grid-template-columns:1fr;}
    .skin-grid{grid-template-columns:1fr;}
  }
  .skin-gen-btn{margin-left:0;padding:6px 16px;font-size:13px;width:100%;margin-bottom:8px;}
  .skin-dc-row{display:flex;gap:8px;margin-bottom:10px;}
  .skin-dc-btn{
    flex:1;height:38px;border-radius:12px;border:none;
    background:#f2f4f6;color:var(--text);font-size:13px;font-weight:700;
    cursor:pointer;font-family:inherit;
  }
  .skin-dc-btn:hover{background:#e5e8eb;}
  .skin-dc-btn.selected{background:var(--danger);color:#fff;}
  .skin-group{
    padding:18px 18px 20px;
    background:#fafbfc;border-radius:16px;
    border:1px solid var(--border);
  }
  .skin-group-title{
    font-size:15.5px;font-weight:800;color:var(--primary-dark);
    padding-bottom:12px;
    border-bottom:2px solid var(--primary-light);
    letter-spacing:-0.01em;
  }
  .skin-group-collapsible .skin-group-title{margin:0 0 10px;padding-bottom:8px;}
  .skin-group-flat .skin-group-title{margin:0 0 10px;padding-bottom:8px;}
  .skin-group.collapsed .skin-group-title{margin-bottom:0;border-bottom:none;padding-bottom:0;}
  .skin-group.collapsed .skin-group-body{display:none;}
  .skin-group.collapsed .cq-chevron::before{content:'+';}
  .skin-btn[data-price]{position:relative;}
  .skin-btn[data-price]:hover::after{
    content:attr(data-price);
    position:absolute;
    bottom:calc(100% + 8px);
    left:50%;
    transform:translateX(-50%);
    background:#ffffff;
    color:var(--text);
    padding:6px 11px;
    border-radius:9px;
    font-size:12px;
    font-weight:700;
    white-space:nowrap;
    pointer-events:none;
    z-index:80;
    box-shadow:0 4px 14px rgba(25,31,40,0.16);
    border:1px solid var(--border);
    transition:none;
  }
  .skin-btn-row{display:flex;flex-wrap:wrap;gap:6px;}
  .skin-item-row{
    display:flex;flex-wrap:wrap;align-items:center;gap:8px;
    margin-bottom:14px;
  }
  .skin-item-row:last-child{margin-bottom:0;}
  .skin-suffix-row{display:flex;flex-wrap:wrap;gap:6px;align-items:center;}
  .skin-btn{
    height:34px;padding:0 14px;border-radius:17px;border:none;
    background:#f2f4f6;color:var(--text);font-size:12.5px;font-weight:600;
    cursor:pointer;white-space:nowrap;font-family:inherit;
  }
  .skin-btn:hover{background:#e5e8eb;}
  .skin-btn.viewing{background:var(--primary-light);color:var(--primary);}
  .skin-btn.suffix{background:var(--accent-light);color:var(--accent);}
  .skin-btn.suffix:hover{background:#d3f5f0;}
  .skin-btn.suffix.selected{background:var(--accent);color:#fff;}
  .skin-btn.direct.selected{background:var(--primary);color:#fff;}
  .skin-btn.rf-amts-btn{background:#f1edff;color:#7c5cfc;height:34px;margin-left:auto;}
  .skin-btn.rf-amts-btn:hover{background:#e5dcff;}
  .skin-btn.rf-amts-btn.selected{background:#7c5cfc;color:#fff;}
  h1{
    font-size:21px;
    color:var(--text);
    text-align:center;
    margin:4px 0 24px;
    font-weight:800;
    letter-spacing:-0.02em;
  }
  h2{font-size:15px;color:var(--text);margin:0 0 10px;}
  .card{
    background:var(--card);
    border:none;
    border-radius:20px;
    padding:20px;
    margin-bottom:16px;
    box-shadow:0 1px 3px rgba(25,31,40,0.04);
  }
  .card-muted{
    background:#e8ebef;
    box-shadow:none;
  }
  .card-muted input, .card-muted .btn-outline{background:#fff;}
  .card-header{
    color:var(--text);
    margin:0 0 16px 0;
    padding-bottom:0;
    border-bottom:none;
    font-weight:700;
    font-size:16px;
    letter-spacing:-0.01em;
    display:flex;
    align-items:center;
  }
  .step-badge{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    width:22px;
    height:22px;
    border-radius:7px;
    background:var(--primary);
    color:#fff;
    font-size:12px;
    font-weight:800;
    margin-right:8px;
    vertical-align:middle;
    flex:0 0 auto;
  }
  .chart-warn-inline{font-size:12px;color:var(--danger);font-weight:700;margin-left:auto;text-align:right;}
  label{font-size:12.5px;color:var(--muted);display:block;margin-bottom:6px;font-weight:600;}
  input[type="password"], input[type="text"], input[type="number"], textarea{
    width:100%;
    border:none;
    border-radius:12px;
    padding:12px 14px;
    font-size:14px;
    font-family:inherit;
    background:#f2f4f6;
    color:var(--text);
    transition:box-shadow .15s ease, background .15s ease;
  }
  input:focus, textarea:focus{outline:none;background:#fff;box-shadow:0 0 0 2px var(--primary);}
  textarea{min-height:90px;resize:vertical;line-height:1.6;}
  .row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:10px;}
  .row > *{flex:1;min-width:0;}
  small.hint{color:var(--muted);font-size:12px;}
  a.linklike{color:var(--primary);text-decoration:none;font-weight:700;font-size:12.5px;}
  a.linklike:hover{text-decoration:underline;}
  button{
    cursor:pointer;
    border:none;
    font-family:inherit;
    transition:background .15s ease, box-shadow .15s ease, transform .05s ease, opacity .15s ease;
  }
  button:active{transform:scale(0.98);}
  .btn-primary{
    background:var(--primary);
    color:#fff;
    padding:15px 16px;
    border-radius:14px;
    font-size:15px;
    font-weight:700;
    width:100%;
    margin-top:8px;
  }
  .btn-primary:hover{background:var(--primary-dark);}
  .btn-primary:disabled{background:#d1d6db;cursor:not-allowed;}
  .btn-outline{
    background:var(--primary-light);
    color:var(--primary);
    border:none;
    padding:14.5px 16px;
    border-radius:14px;
    font-size:15px;
    font-weight:700;
    width:100%;
  }
  .btn-outline:hover{background:#dce9ff;}
  .btn-secondary{
    background:#f2f4f6;
    color:var(--text);
    padding:10px 14px;
    border-radius:10px;
    font-size:12.5px;
    font-weight:700;
  }
  .btn-secondary:hover{background:#e5e8eb;}
  .btn-save{
    background:var(--primary);
    color:#fff;
    padding:11px 16px;
    border-radius:12px;
    font-size:13px;
    font-weight:700;
    white-space:nowrap;
  }
  .btn-save:hover{background:var(--primary-dark);}
  .tabs{display:flex;gap:4px;margin-bottom:14px;background:#f2f4f6;padding:4px;border-radius:14px;}
  .tab-btn{
    flex:1;
    padding:10px;
    border-radius:11px;
    background:transparent;
    color:var(--muted);
    font-size:13px;
    font-weight:700;
    border:none;
  }
  .tab-btn.active{background:#fff;color:var(--text);box-shadow:0 1px 2px rgba(25,31,40,0.08);}
  .tab-content{display:none;}
  .tab-content.active{display:block;}
  #recordBtn, .rec-btn{
    background:var(--primary-light);
    color:var(--primary);
    border:none;
    padding:14.5px;
    border-radius:14px;
    width:100%;
    font-size:15px;
    font-weight:700;
  }
  #recordBtn:hover, .rec-btn:hover{background:#dce9ff;}
  #recordBtn.recording, .rec-btn.recording{background:var(--danger);color:#fff;}
  #recordTimer, .rec-timer{display:block;text-align:center;margin-top:8px;font-size:13px;color:var(--muted);font-weight:600;}
  audio{width:100%;margin-top:10px;}
  .status-msg{margin-top:10px;font-size:12.5px;color:var(--muted);min-height:18px;}

  .two-col{
    display:grid;
    grid-template-columns:0.95fr 1.55fr 1.25fr;
    gap:16px;
    align-items:start;
  }
  @media (max-width:1200px){
    .two-col{grid-template-columns:1fr 1.6fr;}
    .col-cq{grid-column:1 / -1;}
  }
  @media (max-width:720px){
    .two-col{grid-template-columns:1fr;}
    .col-cq{grid-column:auto;}
  }
  .col-cq{position:sticky;top:16px;}
  .cq-card{padding:16px;}
  .cq-toggle-header{
    cursor:pointer;user-select:none;display:flex;align-items:center;
    margin-bottom:0;
  }
  .cq-chevron{
    margin-left:auto;width:26px;height:26px;border-radius:50%;
    background:var(--primary-light);color:var(--primary);
    display:flex;align-items:center;justify-content:center;
    font-size:16px;font-weight:700;line-height:1;
    transition:background .2s ease;
  }
  .cq-toggle-header:hover .cq-chevron{background:#dce9ff;}
  .cq-chevron::before{content:'−';}
  .cq-card.collapsed .cq-chevron::before{content:'+';}
  .cq-body{margin-top:16px;}
  .cq-card.collapsed .cq-body{display:none;}
  .cq-card.collapsed{padding-bottom:16px;}

  .cq-filters{
    display:flex;flex-wrap:wrap;gap:14px;align-items:center;
    margin-bottom:16px;
  }
  .cq-filter-group{display:flex;gap:6px;align-items:center;flex-wrap:nowrap;}
  .cq-filter-label{
    font-size:12.5px;font-weight:700;color:var(--muted);
    min-width:30px;
  }
  .cq-btn{cursor:pointer;}
  .cq-reset{
    height:34px;padding:0 14px;border-radius:12px;
    font-size:12.5px;font-weight:600;cursor:pointer;
    background:#f2f4f6;color:var(--text);border:none;
  }
  .cq-reset:hover{background:#e5e8eb;}
  .cq-row-card{
    background:#fff;border-radius:14px;border:1.5px solid var(--border);
    overflow:hidden;margin-bottom:10px;
  }
  .cq-row-card.filtered{border-color:var(--primary);}
  .cq-row-head{
    display:flex;align-items:center;gap:8px;
    padding:10px 14px;border-bottom:1px solid var(--border);
  }
  .cq-badge{
    font-size:11px;font-weight:700;padding:3px 9px;border-radius:6px;
  }
  .cq-badge-초진{background:var(--primary-light);color:var(--primary-dark);}
  .cq-badge-재진{background:#fef9e7;color:#8b6914;}
  .cq-row-label{font-size:13px;font-weight:700;color:var(--text);flex:1;}
  .cq-price-weekday{font-size:12.5px;color:var(--primary);font-weight:700;}
  .cq-price-sep{font-size:11px;color:var(--muted);margin:0 4px;}
  .cq-price-weekend{font-size:12.5px;color:#a07840;font-weight:700;}
  .cq-combos{padding:8px 14px;display:flex;flex-direction:column;gap:4px;}
  .cq-combo{
    font-size:12px;padding:5px 8px;border-radius:6px;
  }
  .cq-combo:nth-child(odd){background:rgba(49,130,246,0.04);}
  .cq-combo-num{color:var(--muted);font-size:11px;margin-right:6px;}
  .cq-combo-sep{color:var(--border);margin:0 1px;}
  .cq-empty{text-align:center;color:var(--muted);font-size:13px;padding:20px;}
  .cq-card .cq-row-head{padding:9px 12px;}
  .cq-card .cq-row-label{font-size:12.5px;}
  .cq-card .cq-combos{padding:6px 12px;}
  .cq-card .cq-combo{font-size:11px;line-height:1.5;}

  .p-group{margin-bottom:16px;padding-bottom:16px;border-bottom:1px solid var(--border);}
  .p-group:last-child{border-bottom:none;padding-bottom:0;margin-bottom:0;}
  .btn-toggle-row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:8px;align-items:center;}
  .btn-toggle{
    height:34px;
    padding:0 12px;
    border-radius:17px;
    border:none;
    background:#f2f4f6;
    color:var(--text);
    font-size:12.5px;
    font-weight:600;
    white-space:nowrap;
    flex-shrink:0;
    display:inline-flex;
    align-items:center;
  }
  .btn-toggle:hover{background:#e5e8eb;}
  .btn-toggle.sm{
    padding:0 9px;
    font-size:11.5px;
  }
  .btn-toggle.selected{
    background:var(--primary);
    color:#fff;
  }
  .btn-toggle.accent-item.selected{
    background:var(--accent);
    color:#fff;
  }
  .btn-toggle.tier2{
    background:var(--accent-light);
    color:var(--accent);
  }
  .btn-toggle.tier2:hover{background:#d3f5f0;}
  .btn-toggle.tier2.selected{
    background:var(--accent);
    color:#fff;
  }
  .btn-toggle.tier3{
    background:#f1edff;
    color:#7c5cfc;
  }
  .btn-toggle.tier3:hover{background:#e5dcff;}
  .btn-toggle.tier3.selected{
    background:#7c5cfc;
    color:#fff;
  }
  .taping-row{display:flex;gap:8px;align-items:center;margin-top:8px;flex-wrap:wrap;}
  .area-sub{font-size:10px;color:var(--muted);margin-left:2px;font-weight:500;}
  .btn-toggle.selected .area-sub{color:rgba(255,255,255,0.75);}
  .herb-label{font-size:12px;color:var(--muted);font-weight:600;width:52px;flex:0 0 auto;}
  .ch-inline{
    height:34px;
    padding:0 9px;
    border:none;
    border-radius:8px;
    background:#f2f4f6;
    font-family:inherit;
    font-size:12.5px;
    outline:none;
    color:var(--text);
    box-sizing:border-box;
  }
  .ch-inline::-webkit-outer-spin-button,
  .ch-inline::-webkit-inner-spin-button{
    -webkit-appearance:none;
    margin:0;
  }
  .ch-inline[type="number"]{ -moz-appearance:textfield; text-align:center; padding:0 4px; }
  .ch-inline:focus{background:#fff;box-shadow:0 0 0 2px var(--primary);}
  .ch-inline[readonly]{color:var(--muted);}
  .warn-box{
    background:var(--danger-light);
    border:none;
    border-radius:12px;
    padding:12px 14px;
    font-size:12.5px;
    color:var(--danger);
    margin-bottom:12px;
    line-height:1.7;
    font-weight:600;
  }
  .copy-btn-row{display:flex;justify-content:flex-end;margin-top:6px;}
  .disclaimer{
    font-size:12px;
    color:var(--muted);
    text-align:center;
    margin-top:20px;
    line-height:1.7;
  }
  .chart-textarea{min-height:340px;height:auto;overflow-y:hidden;}
  .ta-fac-row{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-top:10px;}
  .chart-btn-row{display:flex;gap:8px;margin-top:8px;align-items:stretch;}
  .chart-btn-row .btn-primary, .chart-btn-row .btn-secondary-wide{margin-top:0;width:auto;flex:1 1 0;}
  .btn-secondary-wide{
    background:var(--primary-light);
    color:var(--primary);
    padding:15px 16px;
    border-radius:14px;
    font-size:15px;
    font-weight:700;
    width:100%;
    margin-top:8px;
  }
  .btn-secondary-wide:hover{background:#dce9ff;}
  .skin-vat-btn{
    height:34px;padding:0 14px;border-radius:10px;border:none;
    background:#f2f4f6;color:var(--text);font-size:12px;font-weight:700;
    cursor:pointer;font-family:inherit;
  }
  .skin-vat-btn:hover{background:#e5e8eb;}
  .skin-vat-btn.selected{background:var(--primary);color:#fff;}
</style>
</head>
<body>
<div class="container">
  <div class="page-tabs">
    <button class="page-tab active" data-page="근골격계" onclick="switchPage('근골격계',this)">통증</button>
    <button class="page-tab" data-page="TA" onclick="switchPage('TA',this)">TA</button>

<script>
/* ==================== 공통 유틸 ==================== */
function $(id){ return document.getElementById(id); }
function elId(ns, name){ return ns + '-' + name; }
function escAttr(s){ return String(s==null?'':s).replace(/"/g,'&quot;'); }
function inputWidthFor(val, min, max){
  const len = (val||'').length;
  return Math.min(max||220, Math.max(min||80, len*8+24));
}
function autoGrow(el){
  if(!el) return;
  el.style.height = 'auto';
  el.style.height = (el.scrollHeight + 4) + 'px';
}
function uppercaseEnglish(text){
  return String(text||'').replace(/[a-z]/g, c => c.toUpperCase());
}

/* ==================== 페이지 전환 ==================== */
function switchPage(name, btn){
  document.querySelectorAll('.page-content').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.page-tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  btn.classList.add('active');
}

/* ==================== 녹음/입력 탭 전환 (ns별) ==================== */
document.querySelectorAll('.tab-btn').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    const ns = btn.dataset.ns;
    document.querySelectorAll(`.tab-btn[data-ns="${ns}"]`).forEach(b=>b.classList.remove('active'));
    ['text','record','upload'].forEach(t=>{
      const el = $(elId(ns, t+'Tab'));
      if(el) el.classList.remove('active');
    });
    btn.classList.add('active');
    $(elId(ns, btn.dataset.tab+'Tab')).classList.add('active');
    const wrap = $(elId(ns,'extraNotesWrap'));
    if(wrap) wrap.style.display = (btn.dataset.tab==='text') ? 'none' : 'block';
  });
});

/* 파일 선택 라벨 (ns별) */
['main','ta'].forEach(ns=>{
  const input = $(elId(ns,'audioFileInput'));
  if(!input) return;
  input.addEventListener('change', (e)=>{
    const label = $(elId(ns,'fileSelectLabel'));
    label.textContent = e.target.files[0] ? e.target.files[0].name : '파일 선택';
  });
});

/* ==================== API KEY (공용) ==================== */
const apiKeyInput = $('apiKeyInput');
const keyStatus = $('keyStatus');
const apiKeyBody = $('apiKeyBody');
const apiKeyHeaderEl = $('apiKeyHeader');
const apiKeyCard = apiKeyHeaderEl.parentElement;
function collapseApiKey(){

const RECSTATE = {
  main: {mediaRecorder:null, chunks:[], blob:null, timerInterval:null, seconds:0},
  ta:   {mediaRecorder:null, chunks:[], blob:null, timerInterval:null, seconds:0}
};
function setupRecording(ns){
  const recordBtn = $(elId(ns,'recordBtn'));
  const recordTimer = $(elId(ns,'recordTimer'));
  const recordedPlayback = $(elId(ns,'recordedPlayback'));
  if(!recordBtn) return;
  recordBtn.addEventListener('click', async ()=>{
    const st = RECSTATE[ns];
    if(st.mediaRecorder && st.mediaRecorder.state === 'recording'){
      st.mediaRecorder.stop();
      return;
    }
    try{
      const stream = await navigator.mediaDevices.getUserMedia({audio:true});
      st.chunks = [];
      let mimeType = '';
      for(const t of ['audio/webm;codecs=opus','audio/webm','audio/mp4','audio/ogg']){
        if(MediaRecorder.isTypeSupported(t)){ mimeType = t; break; }
      }
      st.mediaRecorder = mimeType ? new MediaRecorder(stream,{mimeType}) : new MediaRecorder(stream);
      st.mediaRecorder.ondataavailable = e=>{ if(e.data.size>0) st.chunks.push(e.data); };
      st.mediaRecorder.onstop = ()=>{
        st.blob = new Blob(st.chunks, {type: st.mediaRecorder.mimeType || 'audio/webm'});
        recordedPlayback.src = URL.createObjectURL(st.blob);
        recordedPlayback.style.display = 'block';
        $(elId(ns,'downloadRecordBtn')).style.display = 'block';
        stream.getTracks().forEach(t=>t.stop());
        clearInterval(st.timerInterval);
        recordBtn.textContent = '● 녹음 시작';
        recordBtn.classList.remove('recording');
      };
      st.mediaRecorder.start();
      st.seconds = 0;
      recordTimer.textContent = '00:00';
      st.timerInterval = setInterval(()=>{
        st.seconds++;
        const m = String(Math.floor(st.seconds/60)).padStart(2,'0');
        const s = String(st.seconds%60).padStart(2,'0');
        recordTimer.textContent = `${m}:${s}`;
      },1000);
      recordBtn.textContent = '■ 녹음 종료';
      recordBtn.classList.add('recording');
    }catch(err){
      alert('마이크 접근 권한이 필요합니다: ' + err.message);
    }
  });
  $(elId(ns,'downloadRecordBtn')).addEventListener('click', ()=>{
    const st = RECSTATE[ns];
    if(!st.blob) return;
    const ext = st.blob.type.includes('mp4') ? 'm4a' : st.blob.type.includes('ogg') ? 'ogg' : 'webm';
    const ts = new Date().toISOString().replace(/[:.]/g,'-');
    const url = URL.createObjectURL(st.blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `recording_${ts}.${ext}`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  });
}
setupRecording('main');
setupRecording('ta');

/* ==================== 오디오 변환 ==================== */
async function convertToWav(blob){
  const arrayBuf = await blob.arrayBuffer();
  const tempCtx = new (window.AudioContext||window.webkitAudioContext)();
  const decoded = await tempCtx.decodeAudioData(arrayBuf.slice(0));
  const targetRate = 16000;
  const offlineCtx = new OfflineAudioContext(1, Math.ceil(decoded.duration*targetRate), targetRate);
  const src = offlineCtx.createBufferSource();
  src.buffer = decoded;
  src.connect(offlineCtx.destination);
  src.start(0);
  const rendered = await offlineCtx.startRendering();
  tempCtx.close();
  return audioBufferToWav(rendered);
}
function audioBufferToWav(buffer){
  const samples = buffer.getChannelData(0);
  const sampleRate = buffer.sampleRate;
  const dataSize = samples.length*2;
  const ab = new ArrayBuffer(44+dataSize);
  const view = new DataView(ab);
  function writeStr(off,str){ for(let i=0;i<str.length;i++) view.setUint8(off+i, str.charCodeAt(i)); }
  writeStr(0,'RIFF'); view.setUint32(4,36+dataSize,true); writeStr(8,'WAVE');
  writeStr(12,'fmt '); view.setUint32(16,16,true); view.setUint16(20,1,true);
  view.setUint16(22,1,true); view.setUint32(24,sampleRate,true);
  view.setUint32(28,sampleRate*2,true); view.setUint16(32,2,true); view.setUint16(34,16,true);
  writeStr(36,'data'); view.setUint32(40,dataSize,true);
  let offset=44;
  for(let i=0;i<samples.length;i++){
    let s = Math.max(-1,Math.min(1,samples[i]));
    view.setInt16(offset, s<0? s*0x8000 : s*0x7FFF, true);
    offset+=2;
  }
  return new Blob([ab], {type:'audio/wav'});
}
function blobToBase64(blob){
  return new Promise((resolve,reject)=>{
    const reader = new FileReader();
    reader.onloadend = ()=> resolve(reader.result.split(',')[1]);
    reader.onerror = reject;
    reader.readAsDataURL(blob);
  });
}

async function runGenerate(ns){
  const activeTab = activeTabOf(ns);
  let sourceBlob = null;
  let directText = '';
  let skipAI = false;
  if(activeTab === 'text'){
    directText = $(elId(ns,'directTextInput')).value.trim();
    if(!directText) skipAI = true;
  } else if(activeTab === 'upload'){
    const f = $(elId(ns,'audioFileInput')).files[0];
    if(!f){ alert('오디오 파일을 선택해주세요.'); return; }
    sourceBlob = f;
  } else {
    const rec = RECSTATE[ns];
    if(!rec.blob){ alert('먼저 녹음을 해주세요.'); return; }
    sourceBlob = rec.blob;
  }

  const btn = $(elId(ns,'combineBtn'));
  const statusEl = $(elId(ns,'statusMsg'));
  const warnEl = $(elId(ns,'chartWarn'));
  warnEl.textContent = '';

  if(skipAI){
    $(elId(ns,'soaOutput')).value = '';
    $(elId(ns,'scriptOutput')).value = '';
    statusEl.textContent = '입력 내용이 없어 P 항목만 생성했습니다.';
    combineChart(ns);
    return;
  }

  const apiKey = apiKeyInput.value.trim();
  if(!apiKey){ alert('Gemini API 키를 먼저 입력하고 저장해주세요.'); return; }

  btn.disabled = true;

  try{
    let base64Audio = null;
    if(activeTab !== 'text'){
      statusEl.textContent = '오디오 변환 중...';
      let wavBlob;
      try{
        wavBlob = await convertToWav(sourceBlob);
      }catch(convErr){
        throw new Error('오디오 파일을 읽을 수 없습니다. 다른 형식(m4a, mp3, wav 등)으로 다시 시도해주세요. (' + convErr.message + ')');
      }
      if(wavBlob.size > 19*1024*1024){
        statusEl.textContent = '';
        alert('녹음이 너무 깁니다 (약 10분 이상). 더 짧게 나눠서 시도해주세요.');
        btn.disabled = false;
        return;
      }
      base64Audio = await blobToBase64(wavBlob);
    }
    statusEl.textContent = 'Gemini로 분석 중... (일반적으로 1~2분 정도 걸리고, 녹음이 길수록 더 걸릴 수 있습니다)';

    const contentParts = [];
    if(activeTab === 'text'){
      contentParts.push({text: SOAP_PROMPT});
      contentParts.push({text: '\n\n아래는 이번 진료의 실제 내용입니다. 반드시 이 내용만을 근거로 작성하세요:\n' + directText});
    } else {
      contentParts.push({text: '아래 오디오는 이번 진료의 실제 녹음입니다. 반드시 이 녹음 내용만을 근거로 작성하세요:'});
      contentParts.push({inline_data: {mime_type:'audio/wav', data: base64Audio}});
      const extraNotesEl = $(elId(ns,'extraNotesInput'));
      const extraNotes = extraNotesEl ? extraNotesEl.value.trim() : '';
      if(extraNotes){
        contentParts.push({text: '아래는 녹음에 추가로 의사가 직접 적은 메모입니다. 녹음 내용과 함께 반영하세요:\n' + extraNotes});
      }
      contentParts.push({text: SOAP_PROMPT});
    }

    const MAX_TRIES = 4;
    let data = null;
    for(let attempt = 1; attempt <= MAX_TRIES; attempt++){
      let resp;
      try{
        resp = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`, {
          method: 'POST',
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify({
            contents: [{ parts: contentParts }],
            generationConfig: { temperature: 0.1, seed: 42 }
          })
        });
      }catch(netErr){
        if(attempt < MAX_TRIES){
          statusEl.textContent = `연결이 불안정합니다. 잠시 후 자동으로 다시 시도합니다... (${attempt}/${MAX_TRIES-1})`;
          await new Promise(r => setTimeout(r, attempt * 2500));
          continue;
        }
        throw new Error('네트워크 연결에 실패했습니다. 인터넷 상태를 확인해주세요.');
      }

      data = await resp.json();
      if(resp.ok) break;

      const retryable = [429, 500, 502, 503, 504].includes(resp.status);
      const isLast = attempt >= MAX_TRIES;
      if(retryable && !isLast){
        const waitSec = attempt * 3;
        statusEl.textContent = `AI 서버가 잠시 혼잡합니다. ${waitSec}초 후 자동으로 다시 시도합니다... (${attempt}/${MAX_TRIES-1})`;
        await new Promise(r => setTimeout(r, waitSec * 1000));
        continue;
      }
      const msg = data.error?.message || '알 수 없는 오류';
      if(retryable){
        throw new Error('AI 서버 혼잡이 계속되고 있습니다. 잠시 후 다시 생성하기를 눌러주세요.\n(원문: ' + msg + ')');
      }
      throw new Error(msg);
    }
    const text = data.candidates?.[0]?.content?.parts?.map(p=>p.text).join('') || '';
    let sMatch = text.split('O)')[0].trim();
    sMatch = sMatch.replace(/([^\n])\nS\/H :/, '$1\n\nS/H :');
    let rest = text.split('O)')[1] || '';
    const oMatch = rest.split('A)')[0].trim();
    rest = rest.split('A)')[1] || '';
    let aMatch = rest.split('[SCRIPT]')[0].trim();
    const scriptMatch = (rest.split('[SCRIPT]')[1] || '').trim();

    aMatch = aMatch ? `${aMatch}\n${FIXED_A_EXPLANATION}` : FIXED_A_EXPLANATION;

    $(elId(ns,'soaOutput')).value = `${sMatch}\n\nO)\n${oMatch}\n\nA)\n${aMatch}`;
    $(elId(ns,'scriptOutput')).value = scriptMatch;

    function fieldBlank(t, label){
      const lines = t.split('\n');
      for(const line of lines){
        const marker = label + ' :';
        const idx = line.indexOf(marker);
        if(idx !== -1) return line.slice(idx + marker.length).trim() === '';
      }
      return false;
    }
    const blankFields = [];
    if(fieldBlank(sMatch, 'S/H')) blankFields.push('S/H');
    if(fieldBlank(sMatch, 'P/H')) blankFields.push('P/H');
    if(fieldBlank(sMatch, 'F/H')) blankFields.push('F/H');

    const warnings = [];
    if(/NRS\s*#/.test(sMatch)) warnings.push('NRS 미확인');
    if(blankFields.length) warnings.push(blankFields.join('/') + ' 미확인');
    warnEl.textContent = warnings.length ? ('⚠️ ' + warnings.join(' · ')) : '';

    statusEl.textContent = '완료. 내용을 검수해주세요.';
    combineChart(ns);
  }catch(err){
    statusEl.textContent = '';
    alert('오류가 발생했습니다: ' + err.message);
  }finally{
    btn.disabled = false;
  }
}

  const any = TAFAC.침 || TAFAC.추나 || TAFAC.한약;

  const fac = TAFAC.facility || '한의원';
  let hanyakText = '한약(-)';
  if(TAFAC.한약){
    let dur = '';
    if(TAFAC.hanyakUnknown) dur = '몇일 분인지 모름';
    else if(TAFAC.hanyakDur === 'custom') dur = (TAFAC.hanyakCustom||'') + '일분';

function buildPText(ns){
  const st = PSTATE[ns];
  const isTA = ns === 'ta';
  const ictLabel = isTA ? 'TENS' : 'ICT';
  const a0 = st.acuAreas[0], a1 = st.acuAreas[1];
  const m0 = a0 ? ACU_MAP[a0] : null, m1 = a1 ? ACU_MAP[a1] : null;
  const parts = [];
  function isLimb(area){ return area && (area.indexOf('상지부')===0 || area.indexOf('하지부')===0); }
  function pickArea(key){
    const cands = [];
    if(a0) cands.push({area:a0, m:m0});
    if(a1) cands.push({area:a1, m:m1});
    cands.sort((x,y)=> (isLimb(y.area)?1:0) - (isLimb(x.area)?1:0));
    for(const cd of cands){ if(cd.m && cd.m[key]) return cd; }
    return null;
  }
  let acuPointsStr = '';
  if(st.acuSt.경혈==='경혈2' && m0 && m1){ acuPointsStr = `${m0.경혈} ${m1.경혈}`; parts.push(`경혈2부위(${acuPointsStr})`); }
  else if(st.acuSt.경혈==='경혈1' && m0){ acuPointsStr = m0.경혈; parts.push(`경혈1부위(${acuPointsStr})`); }
  if(st.acuSt.투자){ const p=pickArea('투자'); if(p) parts.push(`투자(${p.m.투자.join(' ')})`); }
  if(st.acuSt.관절){ const p=pickArea('관절'); if(p) parts.push(`관절(${p.m.관절})`); }
  if(st.acuSt.척추){ const p=pickArea('척추'); if(p) parts.push(`척추(${p.m.척추})`); }
  if(st.acuSt.복강){ const p=pickArea('복강'); if(p) parts.push(`복강(${p.m.복강})`); }
  if(st.acuSt.전침) parts.push('침전기자극술');
  if(st.acuSt.습부2 && m0 && m1) parts.push(`습부2부위(${acuShortName(a0)} ${acuShortName(a1)})`);
  else if(st.acuSt.습부2 && m0) parts.push(`습부2부위(${acuShortName(a0)})`);
  if(st.acuSt.습부1 && m0) parts.push(`습부1부위(${acuShortName(a0)})`);
  if(st.acuSt.건부 && m0) parts.push(`건부(${acuShortName(a0)})`);
  if(st.acuSt.간접구){ const p=pickArea('간접구'); if(p) parts.push(`간접구(${p.m.간접구})`); }
  if(!isTA && st.acuSt.핫팩 && a0) parts.push(`핫팩(${acuShortName(a0)})`);
  if(st.acuSt.ir && a0) parts.push(`IR(${acuShortName(a0)})`);
  if(st.acuSt.ict && a0) parts.push(`${ictLabel}(${acuShortName(a0)})`);

  let result = 'P) \n' + parts.join(', ') + ' * 등, 어깨 부위는 0.3cm 이하로 천자함';

  if(st.pYakchim.active){
    const main = (st.pYakchim.kind||'') + (st.pYakchim.cc ? ' '+st.pYakchim.cc : '') + (st.pYakchim.gae ? '*'+st.pYakchim.gae : '');
    let buyi = st.pYakchim.buyi;
    if(isTA && !buyi && acuPointsStr){ buyi = acuPointsStr; }
    const detail = main + (buyi ? ` (${buyi})` : '');
    result += `\n■ 약침 : ${detail}`;
  }
  const chunaType = st.pChunaActive['단순추나'] ? '단순추나' : (st.pChunaActive['복잡추나'] ? '복잡추나' : '');
  if(chunaType){
    const techList = [];
    CHUNA_BTNS.forEach(k=>{
      if(!st.chunaSelected[k]) return;
      const txt = st.chunaText[k] ? `(${st.chunaText[k]})` : '';
      techList.push(k+txt);
    });
    result += `\n■ ${chunaType}${techList.length ? ' : '+techList.join(' - ') : ''}`;
    if(chunaType === '복잡추나'){
      if(st.pChunaSpine === '경추'){
        result += '\n- 상기 환자 경추 추간판 탈출증으로 인한 항강통 및 상지 방사통 호소하여 교정기법 포함한 복잡추나 시행함\n- 복잡추나 시행 이후 통증 감소 및 관절가동범위 증가를 확인함';
      } else if(st.pChunaSpine === '요추'){
        result += '\n- 상기 환자 요추 추간판 탈출증으로 인한 요통 및 하지 방사통 호소하여 교정기법 포함한 복잡추나 시행함\n- 복잡추나 시행 이후 통증 감소 및 관절가동범위 증가를 확인함';
      }
    } else if(chunaType === '단순추나'){
      result += '\n- 단순추나 시행 이후 통증 감소 및 관절가동범위 증가를 확인함';
    }
  }

  if(!isTA){
    let extGroupStarted = false;
    if(st.pTaping.active){
      const gae = st.pTaping.gae || '4';
      const buyiPart = st.pTaping.buyi ? st.pTaping.buyi+' ' : '';
      result += `${extGroupStarted?'\n':'\n\n'}■ 테이핑 : ${buyiPart}(${gae}개)${st.pTaping.allergy ? ' / 알러지 없음' : ''}`;
      extGroupStarted = true;
    }
    if(st.pShockwave.active){
      const buyiPart = st.pShockwave.buyi ? st.pShockwave.buyi+' ' : '';
      result += `${extGroupStarted?'\n':'\n\n'}■ 충격파 : ${buyiPart}(${st.pShockwave.ta || ''}타)${st.pShockwave.noFracture ? ' / 골절, 골다공증 없음' : ''}`;
      extGroupStarted = true;
    }
    const silbiLine = getSilbiLine(ns);
    if(silbiLine){
      result += `\n\n${silbiLine}`;
    }
    let herbGroupStarted = false;
    function herbLine(label, store, unit){
      const dose = (store.perDay || store.totalDays) ? `1일 ${store.perDay||''}${unit} 총 ${store.totalDays||''}일` : '';
      const s = [store.name, dose].filter(Boolean).join(' ');
      const line = `${herbGroupStarted?'\n':'\n\n'}■ ${label}${s ? ' : '+s : ''}`;
      herbGroupStarted = true;
      return line;
    }
    if(st.pHerbActive['보험약']) result += herbLine('보험약', st.herb['보험약'], '회');
    if(st.pHerbActive['상비약']) result += herbLine('상비약', st.herb['상비약'], '회');
    if(st.pHerbActive['탕약']) result += herbLine('탕약', st.herb['탕약'], '첩');

  } else if(st.taJcheop.active){
    const jc = st.taJcheop;
    const days = jc.days || '7';
    const cheop = (parseFloat(days)||0) * 2;
    const namePart = jc.name || '(처방명)';
    const gagamPart = jc.gagam || '';
    result += `\n\n■ ${namePart} ${cheop}첩 ${days}일 처방${gagamPart? ' / '+gagamPart:''}`;
    result += '\n' + buildTaJcheopSentence(cheop, days, namePart, gagamPart);
  }
  return result;
}

/* TA 첩약 문구 자동 생성 (C/C 키워드 기반) */
function detectCC(text){
  text = text || '';
  return {
    요통: /요통|허리/.test(text),
    항강통: /항강통|목\s*뒤|경추/.test(text),
    무릎: /무릎|슬관절/.test(text),
    팔꿈치: /팔꿈치|주관절/.test(text)
  };
}
function taSourceText(){
  const t1 = $('ta-directTextInput') ? $('ta-directTextInput').value : '';
  const t2 = $('ta-extraNotesInput') ? $('ta-extraNotesInput').value : '';
  const t3 = $('ta-scriptOutput') ? $('ta-scriptOutput').value : '';
  const t4 = $('ta-soaOutput') ? $('ta-soaOutput').value : '';
  return [t1,t2,t3,t4].join(' ');
}
function buildTaJcheopSentence(cheop, days, name, gagam){
  const cc = detectCC(taSourceText());
  const painPhrases = [];
  if(cc.항강통) painPhrases.push('NRS # 수준의 항강통 및 경추 관절가동범위 제한');
  if(cc.요통) painPhrases.push('NRS # 수준의 요통 및 요추 관절가동범위 제한');
  if(cc.팔꿈치) painPhrases.push('NRS # 수준의 팔꿈치 통증 및 주관절 관절가동범위 제한');
  if(cc.무릎) painPhrases.push('NRS # 수준의 무릎 통증 및 슬관절 관절가동범위 제한');
  if(!painPhrases.length) painPhrases.push('NRS # 수준의 통증 및 관절가동범위 제한');
  const painText = painPhrases.join(', ');

  const headache = TASTATE.ta.H;
  const headacheText = headache ? ', 두통 동반되고' : '';

  const examParts = [];
  if(cc.항강통) examParts.push('SPURLING(+/+)');
  if(cc.요통) examParts.push('SLRT(+/+)');
  const examText = examParts.length ? `, 이학적 검사상 ${examParts.join(' 및 ')} 확인되었으며` : '';

  const romParts = [];
  if(cc.항강통) romParts.push('경추부');
  if(cc.요통) romParts.push('요추부');
  if(cc.팔꿈치) romParts.push('주관절');
  if(cc.무릎) romParts.push('슬관절');
  const romText = romParts.length ? romParts.join(' 및 ') : '관절';

  const namePart = name || '(처방명)';
  const gagamText = gagam ? `${namePart}을 기본방으로 설정하고 ${gagam} 등의 약재를 더하여` : `${namePart}을 기본방으로 하여`;

  return `- 상기 환자 TA로 인한 ${painText} 호소하며${headacheText}${examText}, 본원 치료로 호전 보임에도 불구하고 ${romText} 관절가동범위 내 통증 잔여하여 환자 동의 하 ${days}일분을 처방하였으며, ${gagamText} 교통사고 후 통증 개선 및 신속한 일상 복귀를 위하여 본 첩약을 처방함`;
}

/* ==================== 차트 결합 ==================== */
function normalizeSectionBreaks(text){
  const lines = text.split('\n');
  const headers = new Set(['S)','O)','A)','P)']);
  const out = [];
  for(let i=0;i<lines.length;i++){
    const cur = lines[i].trim();
    if(headers.has(cur) && out.length>0){
      while(out.length && out[out.length-1].trim()===''){ out.pop(); }
      out.push('');
    }
    out.push(lines[i]);
  }
  return out.join('\n');
}
function chartHeader(){
  const now = new Date();
  const md = (now.getMonth()+1) + '/' + now.getDate();
  return '* ' + md + '\n----------------------------------------------------------------------';
}
function combineChart(ns){
  let soa = $(elId(ns,'soaOutput')).value;
  const hasSoa = soa.trim() !== '';
  let lines = soa.split('\n');

  if(hasSoa){
    if(ns === 'ta'){
      const symptomLine = getTASymptomLine(ns);
      if(symptomLine){
        let sIdx = -1, insertAt = -1;
        for(let i=0;i<lines.length;i++){
          if(lines[i].trim() === 'S)'){ sIdx = i; continue; }
          if(sIdx >= 0){
            const t = lines[i].trim();
            if(/^(O\/S|S\/H|P\/H|F\/H)/.test(t) || t === 'O)'){ insertAt = i; break; }
          }
        }
        if(sIdx >= 0){
          if(insertAt === -1) insertAt = lines.length;
          let at = insertAt;
          while(at-1 > sIdx && lines[at-1].trim() === '') at--;
          lines.splice(at, 0, symptomLine);
        }
      }

      const facilityLine = taFacilitySentence();
      if(facilityLine){
        let osIdx = -1;
        for(let i=0;i<lines.length;i++){ if(/^O\/S/.test(lines[i].trim())){ osIdx = i; break; } }
        if(osIdx >= 0){
          let blockEnd = lines.length;
          for(let i=osIdx+1;i<lines.length;i++){
            const t = lines[i].trim();
            if(t === '' || /^(S\/H|P\/H|F\/H)/.test(t) || t === 'O)'){ blockEnd = i; break; }
          }
          let insertPos = blockEnd;
          for(let i=osIdx+1;i<blockEnd;i++){
            if(/^-\s*치료\s*:/.test(lines[i].trim())){ insertPos = i+1; }
          }
          lines.splice(insertPos, 0, facilityLine);
        }
      }
    }

    const bijeungLine = getBijeungLine(ns);
    if(bijeungLine){
      let aIdx = -1;
      for(let i=0;i<lines.length;i++){ if(lines[i].trim() === 'A)'){ aIdx = i; break; } }
      if(aIdx >= 0){
        let insertAt = lines.length;
        for(let i=aIdx+1;i<lines.length;i++){
          const t = lines[i].trim();
          if(t === '' || /^[SOAP]\)/.test(t) || t.startsWith('[SCRIPT]')){ insertAt = i; break; }
        }
        lines.splice(insertAt, 0, bijeungLine);
      } else {
        lines.push('', 'A)', bijeungLine);
      }
    }
    soa = lines.join('\n');
    soa = normalizeSectionBreaks(soa);
  }

  const p = buildPText(ns);
  let full = hasSoa ? `${chartHeader()}\n\n${soa}\n\n${p}` : `${chartHeader()}\n\n${p}`;
  full = uppercaseEnglish(full);
  const out = $(elId(ns,'fullOutput'));
  out.value = full;
  autoGrow(out);
}

var PART_ORDER = ['변증','IR','핫팩','전침','이체','경혈','관절','척추','투자','습부','단순','복잡'];
function cqGetPartOrder(p){for(var i=0;i<PART_ORDER.length;i++){if(p.indexOf(PART_ORDER[i])>=0)return i;}return 99;}
function cqSortCombo(c){var p=c.split('+');p.sort(function(a,b){return cqGetPartOrder(a.trim())-cqGetPartOrder(b.trim());});return p.join('+');}
function cqColorPart(p){
  p=p.trim();
  if(p.indexOf('변증')>=0)return '<span style="color:var(--danger);font-weight:700">'+p+'</span>';
  if(p==='IR'||p.indexOf('핫팩')>=0)return '<span style="color:var(--muted)">'+p+'</span>';
  if(p.indexOf('전침')>=0)return '<span style="color:var(--primary-dark);font-weight:600">'+p+'</span>';
  if(p.indexOf('이체')>=0||p.indexOf('경혈')>=0)return '<span style="color:var(--primary);font-weight:700">'+p+'</span>';
  if(p.indexOf('관절')>=0||p.indexOf('척추')>=0||p.indexOf('투자')>=0)return '<span style="color:#5b9bff;font-weight:600">'+p+'</span>';
  if(p.indexOf('습부')>=0)return '<span style="color:#a07840;font-weight:700">'+p+'</span>';
  if(p.indexOf('단순')>=0||p.indexOf('복잡')>=0)return '<span style="color:#2e7d32;font-weight:700">'+p+'</span>';
  return '<span>'+p+'</span>';
}
function cqRenderCombo(c){var parts=cqSortCombo(c).split('+');return parts.map(cqColorPart).join('<span class="cq-combo-sep">+</span>');}
function cqMatches(row){
  if(CQ.visit&&row.visit!==CQ.visit)return false;
  if(CQ.cupping&&row.cupping!==CQ.cupping)return false;
  if(CQ.chuna&&row.chuna!==CQ.chuna)return false;
  return true;
}

      var b=document.getElementById(id);
      if(b)b.classList.remove('selected');

  }

}

function catToggleTier(tabns, cat, name, tier, btn){
  var sel = CATSEL[tabns];
  var key = catKey(cat, name);
  var nowActive = !btn.classList.contains('selected');
  var sufRow = btn.closest('.skin-suffix-row');
  if(sufRow){
    Array.prototype.forEach.call(sufRow.querySelectorAll('button.skin-btn'), function(b){ b.classList.remove('selected'); });
  }
  if(nowActive){
    btn.classList.add('selected');
    sel[key] = tier;
  } else {
    delete sel[key];
  }
  var itemBtn = sufRow && sufRow.parentNode ? sufRow.parentNode.querySelector('.skin-btn.direct') : null;
  if(itemBtn){
    itemBtn.classList.toggle('selected', !!sel[key]);
  }
}
function catBolnewmerBaseSelected(){
  var sel = CATSEL.skin;
  return !!(sel[catKey('\ub9ac\ud504\ud305','\ubcfc\ub274\uba38 300\uc0f7')] || sel[catKey('\ub9ac\ud504\ud305','\ubcfc\ub274\uba38 600\uc0f7')]);
}
function catToggleItemOpen(tabns, cat, name, btn){

    alert('\ubcfc\ub274\uba38 300\uc0f7 \ub610\ub294 600\uc0f7\uc744 \uba3c\uc800 \uc120\ud0dd\ud574\uc8fc\uc138\uc694.');
    return;
  }
  var sel = CATSEL[tabns];
  var row = btn.closest('.skin-item-row');
  var sufWrap = row ? row.querySelector('.skin-suffix-row') : null;

    btn.classList.remove('viewing');
    btn.classList.remove('selected');

    delete sel[key];
    if(sufWrap) sufWrap.innerHTML = '';
    return;
  }
  btn.classList.add('viewing');
  var key2 = catKey(cat, name);

  if(!item) return;

  Object.keys(item.tiers).forEach(function(tier){

var CAT_EXCLUSIVE_CATEGORIES = {'쏙 프리미엄': true};
function catToggleSingleTier(tabns, cat, name, tier, btn){
  var sel = CATSEL[tabns];
  var key = catKey(cat, name);
  var nowActive = !btn.classList.contains('selected');
  if(nowActive && CAT_EXCLUSIVE_CATEGORIES[cat]){
    var items = (CAT_CONFIG[tabns].catalog[cat]||[]);
    items.forEach(function(it){

      Array.prototype.forEach.call(group.querySelectorAll('.skin-btn.direct.selected'), function(b){

  }
}
function buildCatItemHTML(tabns, cat, item){

function catSetDiscount(tabns, pct, btn){
  if(CATDC[tabns] === pct){
    CATDC[tabns] = 0;
    btn.classList.remove('selected');
  } else {
    CATDC[tabns] = pct;

      Array.prototype.forEach.call(row.querySelectorAll('.skin-dc-btn'), function(b){ b.classList.remove('selected'); });
    }
    btn.classList.add('selected');

function catDiscountedPrice(tabns, price){
  var pct = CATDC[tabns];
  if(!pct) return price;
  return Math.round(price * (100 - pct) / 100);
}
/* VAT 토글 (현재는 피부 탭 전용으로 사용: 피부시술은 VAT 10% 별도) */
function catToggleVat(tabns, btn, totalId){
  CATVAT[tabns] = !CATVAT[tabns];
  if(btn) btn.classList.toggle('selected', CATVAT[tabns]);
  catShowTotal(tabns, totalId);
}
function catShowTotal(tabns, totalId){
  var cfg = CAT_CONFIG[tabns];
  var sel = CATSEL[tabns];
  var total = 0;
  Object.keys(cfg.catalog).forEach(function(cat){
    cfg.catalog[cat].forEach(function(item){
      var key = catKey(cat, item.name);
      var tier = sel[key];
      if(!tier) return;
      total += catDiscountedPrice(tabns, item.tiers[tier]);
    });
  });
  var vatApplied = CATVAT[tabns];
  if(vatApplied) total = Math.round(total * 1.1);
  var el = document.getElementById(totalId);
  if(el) el.textContent = fmtWon(total) + (vatApplied ? ' (VAT 10% 포함)' : '');
}
function catTodayMD(){ var d = new Date(); return (d.getMonth()+1)+'/'+d.getDate(); }

function catGenerate(tabns, resultId){
  var cfg = CAT_CONFIG[tabns];
  var sel = CATSEL[tabns];
  var date = catTodayMD();
  var lines = [];
  var handledKeys = {};
  var dcNote = CATDC[tabns] ? (' ('+CATDC[tabns]+'% DC)') : '';

  if(tabns === 'skin'){
    var liftItems = cfg.catalog['\ub9ac\ud504\ud305'] || [];
    ['\ubcfc\ub274\uba38 300\uc0f7','\ubcfc\ub274\uba38 600\uc0f7'].forEach(function(baseName){
      var baseKey = catKey('\ub9ac\ud504\ud305', baseName);
      var baseTier = sel[baseKey];
      if(!baseTier) return;
      var addonItem = liftItems.find(function(it){
        return it.name.indexOf('\ubcfc\ub274\uba38 + ') === 0 && !!sel[catKey('\ub9ac\ud504\ud305', it.name)];
      });
      if(!addonItem) return;
      var addonKey = catKey('\ub9ac\ud504\ud305', addonItem.name);
      var addonTier = sel[addonKey];
      var baseItem = liftItems.find(function(it){ return it.name === baseName; });
      var basePrice = catDiscountedPrice(tabns, baseItem.tiers[baseTier]);
      var addonPrice = catDiscountedPrice(tabns, addonItem.tiers[addonTier]);
      var sum = basePrice + addonPrice;
      var addonShortName = addonItem.name.replace('\ubcfc\ub274\uba38 + ', '');
      lines.push('* '+date+' '+baseName+' + '+addonShortName+' | '+fmtWon(basePrice)+' + '+fmtWon(addonPrice)+' = '+fmtWon(sum)+' \uacb0\uc81c'+dcNote);
      handledKeys[baseKey] = true;
      handledKeys[addonKey] = true;
    });

    var upgradeName = '진정 관리 업그레이드';
    Object.keys(cfg.catalog).forEach(function(cat){
      var items = cfg.catalog[cat];
      var upgradeItem = items.find(function(it){ return it.name === upgradeName; });
      if(!upgradeItem) return;
      var upgradeKey = catKey(cat, upgradeName);
      if(handledKeys[upgradeKey]) return;
      var upgradeTier = sel[upgradeKey];
      if(!upgradeTier) return;
      var otherItem = items.find(function(it){
        if(it.name === upgradeName) return false;
        var k = catKey(cat, it.name);
        return !handledKeys[k] && !!sel[k];
      });
      if(!otherItem) return;
      var otherKey = catKey(cat, otherItem.name);
      var otherTier = sel[otherKey];
      var otherPrice = catDiscountedPrice(tabns, otherItem.tiers[otherTier]);
      var upgradePrice = catDiscountedPrice(tabns, upgradeItem.tiers[upgradeTier]);
      var sum = otherPrice + upgradePrice;
      var otherTierText = (otherTier === '시술') ? '' : (' '+otherTier);
      lines.push('* '+date+' '+otherItem.name+otherTierText+' + '+upgradeName+' '+upgradeTier+' | '+fmtWon(otherPrice)+' + '+fmtWon(upgradePrice)+' = '+fmtWon(sum)+' 결제'+dcNote);
      handledKeys[otherKey] = true;
      handledKeys[upgradeKey] = true;
    });
  }

  Object.keys(cfg.catalog).forEach(function(cat){
    cfg.catalog[cat].forEach(function(item){
      var key = catKey(cat, item.name);
      if(handledKeys[key]) return;
      var tier = sel[key];
      if(!tier) return;
      var price = catDiscountedPrice(tabns, item.tiers[tier]);
      var tierText = (tier === '\uc2dc\uc220') ? '' : (' '+tier);
      lines.push('* '+date+' '+item.name+tierText+' | '+fmtWon(price)+' \uacb0\uc81c'+dcNote);
    });
  });
  if(CATVAT[tabns]){
    lines.push('* VAT 10% 별도');
  }
  document.getElementById(resultId).value = lines.join('\n');
}

function catReset(tabns, containerId, resultId, totalId){
  CATSEL[tabns] = {};
  CATDC[tabns] = 0;
  CATVAT[tabns] = false;
  var row = document.getElementById(tabns+'-dc-row');
  if(row){
    Array.prototype.forEach.call(row.querySelectorAll('.skin-dc-btn'), function(b){ b.classList.remove('selected'); });
  }
  var vatBtn = document.getElementById(tabns+'-vat-btn');
  if(vatBtn) vatBtn.classList.remove('selected');
  buildCatUI(tabns, containerId);
  document.getElementById(resultId).value = '';
  var totalEl = document.getElementById(totalId);
  if(totalEl) totalEl.textContent = '';
}

/* ==================== 전달 탭 (통증 탭 전용) ==================== */
var DV_COLORS = {
  'JB':'#7C8FD4','돔':'#5B7C99','핫팩':'#FF6B35','I':'#3B8DCC','약침':'#0052FF',
  '침':'#00C48C','침(전)':'#00C48C',
  '건부':'#88BB00','습부1':'#88BB00','습부2':'#88BB00','간접구':'#D4A574',
  '추나':'#A67C52','추나(환자복)':'#A67C52','충격파':'#1A1D29','BC':'#5B6B81'
};
var DV_FORM = { '핫팩':['부위'], 'I':['부위'], '약침':['종류','cc','개수'] };
var DV_DEFAULT = {
  main: ['BC','습부2','침(전)','I','핫팩'],
  ta:   ['추나','습부2','침(전)','I','핫팩','약침']
};
var DV_CHIM_BASES = ['침','침(전)'];
var DV_CHIM_POS = ['앞침','엎침','옆침/좌','옆침/우'];
var DV_EXCLUSIVE = ['습부1','습부2','건부'];
var DV_EXCLUSIVE2 = ['침','침(전)'];
var DV_EXCLUSIVE3 = ['추나','추나(환자복)'];
var DV_BTN_ORDER = ['핫팩','돔','JB','I','침','침(전)','약침','간접구','습부2','습부1','건부','BC','추나','추나(환자복)','충격파'];

var DVSTATE = {
  main: {treatments:[], seq:1},
  ta:   {treatments:[], seq:1}
};
function dvNewId(ns){ return 'dv-'+ns+'-'+(DVSTATE[ns].seq++)+'-'+Date.now(); }

function dvInsertSorted(ns, obj){
  var list = DVSTATE[ns].treatments;
  var orderIdx = DV_BTN_ORDER.indexOf(obj.base);
  var insertAt = list.length;
  for(var i=0;i<list.length;i++){
    if(DV_BTN_ORDER.indexOf(list[i].base) > orderIdx){ insertAt = i; break; }
  }
  list.splice(insertAt, 0, obj);
}
function dvAdd(ns, base){
  var list = DVSTATE[ns].treatments;
  if(DV_EXCLUSIVE.indexOf(base) >= 0){
    list = list.filter(function(t){ return DV_EXCLUSIVE.indexOf(t.base) < 0; });
  }
  if(DV_EXCLUSIVE2.indexOf(base) >= 0){
    list = list.filter(function(t){ return DV_EXCLUSIVE2.indexOf(t.base) < 0; });
  }
  if(DV_EXCLUSIVE3.indexOf(base) >= 0){
    list = list.filter(function(t){ return DV_EXCLUSIVE3.indexOf(t.base) < 0; });
    list = list.filter(function(t){ return t.base !== 'BC'; });
  } else if(base === 'BC'){
    list = list.filter(function(t){ return DV_EXCLUSIVE3.indexOf(t.base) < 0; });
  }
  DVSTATE[ns].treatments = list;
  dvInsertSorted(ns, { id:dvNewId(ns), base:base, extra:{} });
  dvRender(ns);
}
function dvRemove(ns, id){
  DVSTATE[ns].treatments = DVSTATE[ns].treatments.filter(function(t){ return t.id !== id; });
  dvRender(ns);
}
function dvInit(ns){
  DVSTATE[ns].treatments = [];
  DV_DEFAULT[ns].forEach(function(name){
    var extra = {};
    if(ns === 'ta' && name === '약침'){ extra = {'종류':'중성어혈', 'cc':'0.5CC', '개수':'1'}; }
    dvInsertSorted(ns, { id:dvNewId(ns), base:name, extra:extra });
  });
  dvRender(ns);
}
function dvReset(ns){
  $(elId(ns,'deliver-name')).value = '';
  $(elId(ns,'deliver-region')).value = '';
  $(elId(ns,'deliver-result')).value = '';
  dvInit(ns);
}
function deliverReset(ns){ dvReset(ns); }

function dvTreatmentLabel(t){
  if(DV_CHIM_BASES.indexOf(t.base) >= 0 && t.extra && t.extra['자세']){
    return t.extra['자세'] + (t.base === '침(전)' ? '(전)' : '');
  }
  return t.base;
}

var dvDrag = null;
function dvAttachDrag(chip, id, ns){
  chip.dataset.id = id;
  chip.style.touchAction = 'none';
  chip.addEventListener('pointerdown', function(e){
    if(e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT' || e.target.closest('.dv-del')) return;
    e.preventDefault();
    var startX = e.clientX, startY = e.clientY, started = false;
    function onMove(ev){
      if(!started && (Math.abs(ev.clientX-startX)>6 || Math.abs(ev.clientY-startY)>6)){
        started = true;
        dvDrag = { id: id, ns: ns };
        chip.classList.add('dv-dragging');
      }
    }
    function onUp(ev){
      document.removeEventListener('pointermove', onMove);
      document.removeEventListener('pointerup', onUp);
      chip.classList.remove('dv-dragging');
      if(started && dvDrag){
        var el = document.elementFromPoint(ev.clientX, ev.clientY);
        var targetChip = el && el.closest('#'+elId(ns,'deliver-chips')+' [data-id]');
        if(targetChip && targetChip.dataset.id !== dvDrag.id){
          var rect = targetChip.getBoundingClientRect();
          var insertBefore = (ev.clientX - rect.left) < rect.width/2;
          dvReorder(ns, dvDrag.id, targetChip.dataset.id, insertBefore);
        } else if(!targetChip){
          var container = el && el.closest('#'+elId(ns,'deliver-chips'));
          if(container) dvReorderToEnd(ns, dvDrag.id);
        }
      }
      dvDrag = null;
    }
    document.addEventListener('pointermove', onMove);
    document.addEventListener('pointerup', onUp);
  });
}
function dvReorder(ns, draggedId, targetId, insertBefore){
  var list = DVSTATE[ns].treatments;
  var idx = list.findIndex(function(t){ return t.id === draggedId; });
  if(idx === -1) return;
  var obj = list.splice(idx, 1)[0];
  var targetIdx = list.findIndex(function(t){ return t.id === targetId; });
  var insertAt = insertBefore ? targetIdx : targetIdx + 1;
  list.splice(Math.max(0, insertAt), 0, obj);
  dvRender(ns);
}
function dvReorderToEnd(ns, draggedId){
  var list = DVSTATE[ns].treatments;
  var idx = list.findIndex(function(t){ return t.id === draggedId; });
  if(idx === -1) return;
  var obj = list.splice(idx, 1)[0];
  list.push(obj);
  dvRender(ns);
}

function dvRender(ns){
  var chipsBox = $(elId(ns,'deliver-chips'));
  var btnsBox = $(elId(ns,'deliver-btns'));
  if(!chipsBox || !btnsBox) return;
  chipsBox.innerHTML = '';
  btnsBox.innerHTML = '';
  var treatments = DVSTATE[ns].treatments;

  treatments.forEach(function(t){
    var color = DV_COLORS[t.base] || '#0052FF';
    var fields = DV_FORM[t.base];
    if(fields){
      var chip = document.createElement('div');
      chip.className = 'dv-chip-split';
      chip.style.setProperty('--dvcolor', color);
      var label = document.createElement('div');
      label.className = 'dv-label'; label.textContent = t.base;
      chip.appendChild(label);
      fields.forEach(function(f){
        var inp = document.createElement('input');
        inp.placeholder = f;
        inp.value = t.extra[f] || '';
        inp.addEventListener('input', function(e){ t.extra[f] = e.target.value; });
        chip.appendChild(inp);
      });
      var del = document.createElement('div');
      del.className = 'dv-del'; del.textContent = '✕';
      del.addEventListener('click', function(){ dvRemove(ns, t.id); });
      chip.appendChild(del);
      dvAttachDrag(chip, t.id, ns);
      chipsBox.appendChild(chip);
    } else if(DV_CHIM_BASES.indexOf(t.base) >= 0){
      var chip2 = document.createElement('div');
      chip2.className = 'dv-chip-split';
      chip2.style.setProperty('--dvcolor', color);
      var label2 = document.createElement('div');
      label2.className = 'dv-label'; label2.textContent = t.base;
      chip2.appendChild(label2);
      var sel = document.createElement('select');
      var optD = document.createElement('option');
      optD.value = ''; optD.textContent = '자세';
      sel.appendChild(optD);
      DV_CHIM_POS.forEach(function(p){
        var o = document.createElement('option'); o.value = p; o.textContent = p;
        sel.appendChild(o);
      });
      if(!t.extra) t.extra = {};
      sel.value = t.extra['자세'] || '';
      sel.addEventListener('change', function(e){ t.extra['자세'] = e.target.value; });
      chip2.appendChild(sel);
      var del2 = document.createElement('div');
      del2.className = 'dv-del'; del2.textContent = '✕';
      del2.addEventListener('click', function(){ dvRemove(ns, t.id); });
      chip2.appendChild(del2);
      dvAttachDrag(chip2, t.id, ns);
      chipsBox.appendChild(chip2);
    } else {
      var chip3 = document.createElement('div');
      chip3.className = 'dv-chip';
      chip3.style.setProperty('--dvcolor', color);
      var sp = document.createElement('span'); sp.textContent = t.base;
      chip3.appendChild(sp);
      var del3 = document.createElement('span');
      del3.className = 'dv-del'; del3.textContent = '✕';
      del3.addEventListener('click', function(){ dvRemove(ns, t.id); });
      chip3.appendChild(del3);
      dvAttachDrag(chip3, t.id, ns);
      chipsBox.appendChild(chip3);
    }
  });

  var added = {};
  treatments.forEach(function(t){ added[t.base] = true; });
  DV_BTN_ORDER.forEach(function(name){
    if(name === '습부1'){
      var brk = document.createElement('div');
      brk.style.flexBasis = '100%';
      brk.style.height = '0';
      btnsBox.appendChild(brk);
    }
    if(added[name]) return;
    var btn = document.createElement('button');
    btn.className = 'dv-btn';
    btn.style.setProperty('--dvcolor', DV_COLORS[name] || '#0052FF');
    btn.textContent = name;
    btn.addEventListener('click', function(){ dvAdd(ns, name); });
    btnsBox.appendChild(btn);
  });
}

function dvBuildSummary(ns){
  var treatments = DVSTATE[ns].treatments.slice();
  var yakIdx = treatments.findIndex(function(t){ return t.base === '약침'; });
  var chimIdx = treatments.findIndex(function(t){ return t.base === '침(전)'; });
  var out = [];
  for(var i=0;i<treatments.length;i++){
    if(i === yakIdx && chimIdx > -1) continue;
    var t = treatments[i];
    if(i === chimIdx && yakIdx > -1){
      var yak = treatments[yakIdx];
      var kind = yak.extra['종류'] || '';
      var cc = yak.extra['cc'] || '';
      var count = yak.extra['개수'] || '';
      var detail = kind;
      if(cc || count) detail += '('+cc+'cc*'+count+')';
      out.push(dvTreatmentLabel(t) + '+' + detail);
      continue;
    }
    if(t.base === 'I'){
      var vI = (t.extra['부위'] && t.extra['부위'].trim()) ? t.extra['부위'].trim() : '';
      out.push('I' + (vI ? '('+vI+')' : ''));
      continue;
    }
    if(t.base === '핫팩'){
      var vH = t.extra['부위'] || '';
      out.push('HP' + (vH ? '('+vH+')' : ''));
      continue;
    }
    var fields = DV_FORM[t.base];
    if(fields){
      var vals = fields.map(function(f){ return t.extra[f]; }).filter(function(v){ return v; });
      out.push(t.base + (vals.length ? '('+vals.join('/')+')' : ''));
    } else {
      out.push(dvTreatmentLabel(t));
    }
  }
  return out.map(function(s,i){ return (i+1)+s; }).join(' ');
}

function deliverCopy(ns){
  var name = $(elId(ns,'deliver-name')).value.trim();
  var region = $(elId(ns,'deliver-region')).value.trim();
  var summary = dvBuildSummary(ns);
  var prefix = [name, region].filter(function(v){ return v; }).join(' ');
  var text = (prefix ? prefix + ' ' : '') + summary;
  var el = $(elId(ns,'deliver-result'));
  el.value = text;
  if(navigator.clipboard && window.isSecureContext){
    navigator.clipboard.writeText(text).then(function(){ showToastDv('복사되었습니다'); }).catch(function(){ dvFallbackCopy(el); });
  } else {
    dvFallbackCopy(el);
  }
}
function dvFallbackCopy(el){
  el.removeAttribute('readonly');
  el.select(); el.setSelectionRange(0,99999);
  try{ document.execCommand('copy'); showToastDv('복사되었습니다'); }
  catch(e){ showToastDv('복사 실패 — 직접 선택 후 복사하세요'); }
  el.setAttribute('readonly','');
}
function showToastDv(msg){
  if(typeof showToast === 'function'){ showToast(msg); return; }
  alert(msg);
}
