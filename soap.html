<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>차트</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --primary:#3182f6;
    --primary-dark:#1b64da;
    --primary-light:#eaf2ff;
    --accent:#00c2b3;
    --accent-light:#e3faf7;
    --danger:#f04452;
    --danger-light:#fef0f1;
    --bg:#f2f4f6;
    --card:#ffffff;
    --border:#f2f4f6;
    --text:#191f28;
    --muted:#8b95a1;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:'Noto Sans KR',sans-serif;
    background:var(--bg);
    color:var(--text);
    padding:20px;
    -webkit-font-smoothing:antialiased;
  }
  .container{max-width:1680px;margin:0 auto;}
  /* 상단 페이지 탭 */
  .page-tabs{
    display:flex;gap:6px;margin:0 0 20px;
    border-bottom:2px solid var(--border);
    position:sticky;top:0;z-index:200;
    background:var(--bg);padding-top:8px;
  }
  .page-tab{
    padding:12px 24px;background:transparent;border:none;
    font-size:16px;font-weight:800;color:var(--muted);
    cursor:pointer;border-bottom:3px solid transparent;
    margin-bottom:-2px;letter-spacing:-0.02em;
    font-family:inherit;
  }
  .page-tab:hover{color:var(--text);}
  .page-tab.active{color:var(--primary);border-bottom-color:var(--primary);}
  .page-content{display:none;}
  .p-reset-row{display:flex;justify-content:flex-end;margin-top:14px;}
  .p-reset-btn{
    padding:8px 18px;font-size:12.5px;font-weight:700;
    background:var(--danger-light);color:var(--danger);
    border:none;border-radius:10px;cursor:pointer;font-family:inherit;
  }
  .p-reset-btn:hover{background:#fddfe2;}
  .page-content.active{display:block;}
  /* 전달 탭 */
  .deliver-toprow{display:flex;gap:10px;margin-bottom:16px;}
  .deliver-input{
    flex:1;border:none;border-radius:12px;padding:12px 14px;
    font-size:15px;font-family:inherit;background:#f2f4f6;color:var(--text);font-weight:600;
  }
  .deliver-input:focus{outline:none;background:#f2f4f6;box-shadow:none;}
  .deliver-chips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px;min-height:4px;}
  .deliver-btns{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px;padding-top:14px;border-top:1px solid var(--border);}
  .dv-btn{
    height:36px;padding:0 14px;border:1px solid var(--border);
    background:#fff;color:var(--text-secondary);border-radius:8px;
    font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s;
  }
  .dv-btn:hover{border-color:var(--dvcolor);color:var(--dvcolor);}
  .dv-chip{
    display:flex;align-items:center;height:36px;gap:6px;padding:0 12px;
    border-radius:8px;font-size:13px;font-weight:600;color:#fff;background:var(--dvcolor);white-space:nowrap;
  }
  .dv-chip .dv-del{cursor:pointer;opacity:0.85;font-size:12px;padding:2px 2px;}
  .dv-chip .dv-del:hover{opacity:1;}
  .dv-chip-split{
    display:flex;align-items:stretch;height:36px;padding:0;border-radius:8px;overflow:hidden;
  }
  .dv-chip-split .dv-label{background:var(--dvcolor);color:#fff;font-weight:600;font-size:13px;padding:0 10px;display:flex;align-items:center;white-space:nowrap;}
  .dv-chip-split input{border:none;background:var(--dvcolor);font-size:13px;padding:0 6px;width:56px;color:#fff;font-family:inherit;}
  .dv-chip-split input::placeholder{color:rgba(255,255,255,0.7);}
  .dv-chip-split input:focus{outline:none;background:var(--dvcolor) !important;box-shadow:none !important;filter:none !important;}
  .dv-chip-split select{border:none;background:var(--dvcolor);font-size:12px;font-weight:500;padding:0 6px;color:#fff;cursor:pointer;font-family:inherit;border-left:1px solid rgba(255,255,255,0.2);}
  .dv-chip-split select:focus{outline:none;background:var(--dvcolor) !important;filter:none !important;}
  .dv-chip-split .dv-del{background:var(--dvcolor);display:flex;align-items:center;padding:0 10px;cursor:pointer;color:rgba(255,255,255,0.85);font-size:12px;border-left:1px solid rgba(255,255,255,0.2);}
  .dv-chip-split .dv-del:hover{color:#fff;}
  .dv-chip.dv-dragging, .dv-chip-split.dv-dragging{opacity:0.4;}
  .dv-chip, .dv-chip-split{cursor:grab;}
  .dv-chip:active, .dv-chip-split:active{cursor:grabbing;}
  .deliver-actions{display:flex;gap:10px;margin-bottom:14px;}
  .deliver-result{
    width:100%;min-height:80px;border:none;border-radius:12px;padding:14px;
    font-size:15px;font-family:inherit;background:#f2f4f6;color:var(--text);resize:vertical;line-height:1.6;font-weight:600;
  }
  .deliver-result:focus{outline:none;}
  .deliver-result::placeholder{font-weight:400;font-size:12.5px;color:var(--muted);}
  /* 피부 시술 선택 */
  .skin-layout{
    display:grid;grid-template-columns:1.7fr 1fr;gap:16px;align-items:start;
  }
  .skin-output-card{position:sticky;top:16px;}
  .skin-grid{
    display:grid;grid-template-columns:1fr 1fr;gap:12px;align-items:start;
  }
  @media (max-width:900px){
    .skin-layout{grid-template-columns:1fr;}
    .skin-grid{grid-template-columns:1fr;}
  }
  .skin-gen-btn{margin-left:0;padding:6px 16px;font-size:13px;width:100%;margin-bottom:8px;}
  .skin-group{
    padding:12px 14px;
    background:#fafbfc;border-radius:12px;
  }
  .skin-group-title{
    font-size:13px;font-weight:800;color:var(--text);
    margin-bottom:10px;
  }
  .skin-btn-row{display:flex;flex-wrap:wrap;gap:6px;}
  /* 세부 버튼: 그룹 안에서만 딱 펼쳐짐 */
  .skin-suffix-row{display:flex;flex-wrap:wrap;gap:6px;}
  .skin-suffix-row:not(:empty){
    margin-top:8px;padding-top:8px;
    border-top:1px dashed var(--border);
  }
  .skin-btn{
    height:34px;padding:0 14px;border-radius:17px;border:none;
    background:#f2f4f6;color:var(--text);font-size:12.5px;font-weight:600;
    cursor:pointer;white-space:nowrap;font-family:inherit;
  }
  .skin-btn:hover{background:#e5e8eb;}
  .skin-btn.viewing{background:var(--primary-light);color:var(--primary);}
  .skin-btn.suffix{background:var(--accent-light);color:var(--accent);}
  .skin-btn.suffix:hover{background:#d3f5f0;}
  .skin-btn.suffix.selected{background:var(--accent);color:#fff;}
  .skin-btn.direct.selected{background:var(--primary);color:#fff;}
  .skin-btn.rf-amts-btn{background:#f1edff;color:#7c5cfc;height:34px;margin-left:auto;}
  .skin-btn.rf-amts-btn:hover{background:#e5dcff;}
  .skin-btn.rf-amts-btn.selected{background:#7c5cfc;color:#fff;}
  h1{
    font-size:21px;
    color:var(--text);
    text-align:center;
    margin:4px 0 24px;
    font-weight:800;
    letter-spacing:-0.02em;
  }
  h2{font-size:15px;color:var(--text);margin:0 0 10px;}
  .card{
    background:var(--card);
    border:none;
    border-radius:20px;
    padding:20px;
    margin-bottom:16px;
    box-shadow:0 1px 3px rgba(25,31,40,0.04);
  }
  .card-muted{
    background:#e8ebef;
    box-shadow:none;
  }
  .card-muted input, .card-muted .btn-outline{background:#fff;}
  .card-header{
    color:var(--text);
    margin:0 0 16px 0;
    padding-bottom:0;
    border-bottom:none;
    font-weight:700;
    font-size:16px;
    letter-spacing:-0.01em;
    display:flex;
    align-items:center;
  }
  .step-badge{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    width:22px;
    height:22px;
    border-radius:7px;
    background:var(--primary);
    color:#fff;
    font-size:12px;
    font-weight:800;
    margin-right:8px;
    vertical-align:middle;
    flex:0 0 auto;
  }
  label{font-size:12.5px;color:var(--muted);display:block;margin-bottom:6px;font-weight:600;}
  input[type="password"], input[type="text"], input[type="number"], textarea{
    width:100%;
    border:none;
    border-radius:12px;
    padding:12px 14px;
    font-size:14px;
    font-family:inherit;
    background:#f2f4f6;
    color:var(--text);
    transition:box-shadow .15s ease, background .15s ease;
  }
  input:focus, textarea:focus{outline:none;background:#fff;box-shadow:0 0 0 2px var(--primary);}
  textarea{min-height:90px;resize:vertical;line-height:1.6;}
  .row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:10px;}
  .row > *{flex:1;min-width:0;}
  small.hint{color:var(--muted);font-size:12px;}
  a.linklike{color:var(--primary);text-decoration:none;font-weight:700;font-size:12.5px;}
  a.linklike:hover{text-decoration:underline;}
  button{
    cursor:pointer;
    border:none;
    font-family:inherit;
    transition:background .15s ease, box-shadow .15s ease, transform .05s ease, opacity .15s ease;
  }
  button:active{transform:scale(0.98);}
  .btn-primary{
    background:var(--primary);
    color:#fff;
    padding:15px 16px;
    border-radius:14px;
    font-size:15px;
    font-weight:700;
    width:100%;
    margin-top:8px;
  }
  .btn-primary:hover{background:var(--primary-dark);}
  .btn-primary:disabled{background:#d1d6db;cursor:not-allowed;}
  .btn-outline{
    background:var(--primary-light);
    color:var(--primary);
    border:none;
    padding:14.5px 16px;
    border-radius:14px;
    font-size:15px;
    font-weight:700;
    width:100%;
  }
  .btn-outline:hover{background:#dce9ff;}
  .btn-secondary{
    background:#f2f4f6;
    color:var(--text);
    padding:10px 14px;
    border-radius:10px;
    font-size:12.5px;
    font-weight:700;
  }
  .btn-secondary:hover{background:#e5e8eb;}
  .btn-save{
    background:var(--primary);
    color:#fff;
    padding:11px 16px;
    border-radius:12px;
    font-size:13px;
    font-weight:700;
    white-space:nowrap;
  }
  .btn-save:hover{background:var(--primary-dark);}
  .tabs{display:flex;gap:4px;margin-bottom:14px;background:#f2f4f6;padding:4px;border-radius:14px;}
  .tab-btn{
    flex:1;
    padding:10px;
    border-radius:11px;
    background:transparent;
    color:var(--muted);
    font-size:13px;
    font-weight:700;
    border:none;
  }
  .tab-btn.active{background:#fff;color:var(--text);box-shadow:0 1px 2px rgba(25,31,40,0.08);}
  .tab-content{display:none;}
  .tab-content.active{display:block;}
  #recordBtn{
    background:var(--primary-light);
    color:var(--primary);
    border:none;
    padding:14.5px;
    border-radius:14px;
    width:100%;
    font-size:15px;
    font-weight:700;
  }
  #recordBtn:hover{background:#dce9ff;}
  #recordBtn.recording{background:var(--danger);color:#fff;}
  #recordTimer{display:block;text-align:center;margin-top:8px;font-size:13px;color:var(--muted);font-weight:600;}
  audio{width:100%;margin-top:10px;}
  #statusMsg{margin-top:10px;font-size:12.5px;color:var(--muted);min-height:18px;}

  .two-col{
    display:grid;
    grid-template-columns:0.95fr 1.55fr 1.25fr;
    gap:16px;
    align-items:start;
  }
  @media (max-width:1200px){
    .two-col{grid-template-columns:1fr 1.6fr;}
    .col-cq{grid-column:1 / -1;}
  }
  @media (max-width:720px){
    .two-col{grid-template-columns:1fr;}
    .col-cq{grid-column:auto;}
  }
  /* 청구 열: 스크롤 따라오도록 고정 + 좁은 폭 대응 */
  .col-cq{position:sticky;top:16px;}
  .cq-card{padding:16px;}
  /* 청구 토글 */
  .cq-toggle-header{
    cursor:pointer;user-select:none;display:flex;align-items:center;
    margin-bottom:0;
  }
  .cq-chevron{
    margin-left:auto;width:26px;height:26px;border-radius:50%;
    background:var(--primary-light);color:var(--primary);
    display:flex;align-items:center;justify-content:center;
    font-size:16px;font-weight:700;line-height:1;
    transition:background .2s ease;
  }
  .cq-toggle-header:hover .cq-chevron{background:#dce9ff;}
  .cq-chevron::before{content:'−';}
  .cq-card.collapsed .cq-chevron::before{content:'+';}
  .cq-body{margin-top:16px;}
  .cq-card.collapsed .cq-body{display:none;}
  .cq-card.collapsed{padding-bottom:16px;}

  /* ── 청구 수가 조회 ── */
  .cq-filters{
    display:flex;flex-wrap:wrap;gap:14px;align-items:center;
    margin-bottom:16px;
  }
  .cq-filter-group{display:flex;gap:6px;align-items:center;flex-wrap:nowrap;}
  .cq-filter-label{
    font-size:12.5px;font-weight:700;color:var(--muted);
    min-width:30px;
  }
  .cq-btn{cursor:pointer;}
  .cq-reset{
    height:34px;padding:0 14px;border-radius:12px;
    font-size:12.5px;font-weight:600;cursor:pointer;
    background:#f2f4f6;color:var(--text);border:none;
  }
  .cq-reset:hover{background:#e5e8eb;}
  .cq-row-card{
    background:#fff;border-radius:14px;border:1.5px solid var(--border);
    overflow:hidden;margin-bottom:10px;
  }
  .cq-row-card.filtered{border-color:var(--primary);}
  .cq-row-head{
    display:flex;align-items:center;gap:8px;
    padding:10px 14px;border-bottom:1px solid var(--border);
  }
  .cq-badge{
    font-size:11px;font-weight:700;padding:3px 9px;border-radius:6px;
  }
  .cq-badge-초진{background:var(--primary-light);color:var(--primary-dark);}
  .cq-badge-재진{background:#fef9e7;color:#8b6914;}
  .cq-row-label{font-size:13px;font-weight:700;color:var(--text);flex:1;}
  .cq-price-weekday{font-size:12.5px;color:var(--primary);font-weight:700;}
  .cq-price-sep{font-size:11px;color:var(--muted);margin:0 4px;}
  .cq-price-weekend{font-size:12.5px;color:#a07840;font-weight:700;}
  .cq-combos{padding:8px 14px;display:flex;flex-direction:column;gap:4px;}
  .cq-combo{
    font-size:12px;padding:5px 8px;border-radius:6px;
  }
  .cq-combo:nth-child(odd){background:rgba(49,130,246,0.04);}
  .cq-combo-num{color:var(--muted);font-size:11px;margin-right:6px;}
  .cq-combo-sep{color:var(--border);margin:0 1px;}
  .cq-empty{text-align:center;color:var(--muted);font-size:13px;padding:20px;}
  /* 좁은 청구 열 컴팩트 대응 */
  .cq-card .cq-row-head{padding:9px 12px;}
  .cq-card .cq-row-label{font-size:12.5px;}
  .cq-card .cq-combos{padding:6px 12px;}
  .cq-card .cq-combo{font-size:11px;line-height:1.5;}

  .p-group{margin-bottom:16px;padding-bottom:16px;border-bottom:1px solid var(--border);}
  .p-group:last-child{border-bottom:none;padding-bottom:0;margin-bottom:0;}
  .btn-toggle-row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:8px;align-items:center;}
  .btn-toggle{
    height:34px;
    padding:0 12px;
    border-radius:17px;
    border:none;
    background:#f2f4f6;
    color:var(--text);
    font-size:12.5px;
    font-weight:600;
    white-space:nowrap;
    flex-shrink:0;
    display:inline-flex;
    align-items:center;
  }
  .btn-toggle:hover{background:#e5e8eb;}
  .btn-toggle.sm{
    padding:0 9px;
    font-size:11.5px;
  }
  .btn-toggle.selected{
    background:var(--primary);
    color:#fff;
  }
  .btn-toggle.accent-item.selected{
    background:var(--accent);
    color:#fff;
  }
  /* 위계 2단계: 상위 토글 안에 속한 세부 옵션 (예: 약침 종류/용량/개수, 추나 루틴 프리셋) */
  .btn-toggle.tier2{
    background:var(--accent-light);
    color:var(--accent);
  }
  .btn-toggle.tier2:hover{background:#d3f5f0;}
  .btn-toggle.tier2.selected{
    background:var(--accent);
    color:#fff;
  }
  /* 위계 3단계: 세부 옵션 안의 더 상세한 항목 (예: 추나 개별 기법) */
  .btn-toggle.tier3{
    background:#f1edff;
    color:#7c5cfc;
  }
  .btn-toggle.tier3:hover{background:#e5dcff;}
  .btn-toggle.tier3.selected{
    background:#7c5cfc;
    color:#fff;
  }
  .taping-row{display:flex;gap:8px;align-items:center;margin-top:8px;flex-wrap:wrap;}
  .area-sub{font-size:10px;color:var(--muted);margin-left:2px;font-weight:500;}
  .btn-toggle.selected .area-sub{color:rgba(255,255,255,0.75);}
  .herb-label{font-size:12px;color:var(--muted);font-weight:600;width:52px;flex:0 0 auto;}
  .ch-inline{
    height:34px;
    padding:0 9px;
    border:none;
    border-radius:8px;
    background:#f2f4f6;
    font-family:inherit;
    font-size:12.5px;
    outline:none;
    color:var(--text);
    box-sizing:border-box;
  }
  .ch-inline::-webkit-outer-spin-button,
  .ch-inline::-webkit-inner-spin-button{
    -webkit-appearance:none;
    margin:0;
  }
  .ch-inline[type="number"]{ -moz-appearance:textfield; text-align:center; padding:0 4px; }
  .ch-inline:focus{background:#fff;box-shadow:0 0 0 2px var(--primary);}
  .warn-box{
    background:var(--danger-light);
    border:none;
    border-radius:12px;
    padding:12px 14px;
    font-size:12.5px;
    color:var(--danger);
    margin-bottom:12px;
    line-height:1.7;
    font-weight:600;
  }
  .copy-btn-row{display:flex;justify-content:flex-end;margin-top:6px;}
  .disclaimer{
    font-size:12px;
    color:var(--muted);
    text-align:center;
    margin-top:20px;
    line-height:1.7;
  }
</style>
</head>
<body>
<div class="container">
  <div class="page-tabs">
    <button class="page-tab active" data-page="근골격계" onclick="switchPage('근골격계',this)">통증</button>
    <button class="page-tab" data-page="피부" onclick="switchPage('피부',this)">피부</button>
  </div>

  <div id="page-근골격계" class="page-content active">
  <div class="two-col">
    <div class="col-left">
      <div class="card">
        <div class="card-header"><span class="step-badge">1</span>녹음</div>
        <div class="tabs">
          <button class="tab-btn active" data-tab="text">직접 입력</button>
          <button class="tab-btn" data-tab="record">직접 녹음</button>
          <button class="tab-btn" data-tab="upload">녹음 파일 업로드</button>
        </div>

        <div class="tab-content active" id="textTab">
          <textarea id="directTextInput" style="min-height:140px;" placeholder="진료한 내용을 텍스트로 입력해주세요"></textarea>
        </div>

        <div class="tab-content" id="recordTab">
          <button id="recordBtn">● 녹음 시작</button>
          <span id="recordTimer">00:00</span>
          <audio id="recordedPlayback" controls style="display:none"></audio>
          <button class="btn-secondary" id="downloadRecordBtn" style="display:none;width:100%;margin-top:8px;">녹음 파일 다운로드 (백업)</button>
        </div>

        <div class="tab-content" id="uploadTab">
          <label for="audioFileInput" class="btn-outline" id="fileSelectLabel" style="cursor:pointer;text-align:center;display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">파일 선택</label>
          <input type="file" id="audioFileInput" accept="audio/*,video/webm,.webm,.ogg,.m4a,.mp4,.wav,.mp3,.aac,.aiff,.flac" style="display:none;">
        </div>

        <div id="extraNotesWrap" style="display:none;margin-top:10px;">
          <textarea id="extraNotesInput" style="min-height:70px;" placeholder="녹음에 없는 내용을 추가로 적어주세요 (선택)"></textarea>
        </div>

        <button class="btn-primary" id="analyzeBtn">생성하기</button>
        <div id="statusMsg"></div>
      </div>

      <div class="card">

// ---------- Recording ----------
let mediaRecorder, recordedChunks = [], recordedBlob = null, recordTimerInterval, recordSeconds = 0;
const recordBtn = document.getElementById('recordBtn');
const recordTimer = document.getElementById('recordTimer');
const recordedPlayback = document.getElementById('recordedPlayback');

recordBtn.addEventListener('click', async ()=>{
  if(mediaRecorder && mediaRecorder.state === 'recording'){
    mediaRecorder.stop();
    return;
  }
  try{
    const stream = await navigator.mediaDevices.getUserMedia({audio:true});
    recordedChunks = [];
    let mimeType = '';
    for(const t of ['audio/webm;codecs=opus','audio/webm','audio/mp4','audio/ogg']){
      if(MediaRecorder.isTypeSupported(t)){ mimeType = t; break; }
    }
    mediaRecorder = mimeType ? new MediaRecorder(stream,{mimeType}) : new MediaRecorder(stream);
    mediaRecorder.ondataavailable = e=>{ if(e.data.size>0) recordedChunks.push(e.data); };
    mediaRecorder.onstop = ()=>{
      recordedBlob = new Blob(recordedChunks, {type: mediaRecorder.mimeType || 'audio/webm'});
      recordedPlayback.src = URL.createObjectURL(recordedBlob);
      recordedPlayback.style.display = 'block';
      document.getElementById('downloadRecordBtn').style.display = 'block';
      stream.getTracks().forEach(t=>t.stop());
      clearInterval(recordTimerInterval);
      recordBtn.textContent = '● 녹음 시작';
      recordBtn.classList.remove('recording');
    };
    mediaRecorder.start();
    recordSeconds = 0;
    recordTimer.textContent = '00:00';
    recordTimerInterval = setInterval(()=>{
      recordSeconds++;
      const m = String(Math.floor(recordSeconds/60)).padStart(2,'0');
      const s = String(recordSeconds%60).padStart(2,'0');
      recordTimer.textContent = `${m}:${s}`;
    },1000);
    recordBtn.textContent = '■ 녹음 종료';
    recordBtn.classList.add('recording');
  }catch(err){
    alert('마이크 접근 권한이 필요합니다: ' + err.message);
  }
});

document.getElementById('downloadRecordBtn').addEventListener('click', ()=>{
  if(!recordedBlob) return;
  const ext = recordedBlob.type.includes('mp4') ? 'm4a' : recordedBlob.type.includes('ogg') ? 'ogg' : 'webm';
  const ts = new Date().toISOString().replace(/[:.]/g,'-');
  const url = URL.createObjectURL(recordedBlob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `recording_${ts}.${ext}`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
});

// ---------- Convert any audio blob to 16kHz mono WAV (음성인식 표준 품질) ----------
async function convertToWav(blob){
  const arrayBuf = await blob.arrayBuffer();
  const tempCtx = new (window.AudioContext||window.webkitAudioContext)();
  const decoded = await tempCtx.decodeAudioData(arrayBuf.slice(0));
  const targetRate = 16000;
  const offlineCtx = new OfflineAudioContext(1, Math.ceil(decoded.duration*targetRate), targetRate);
  const src = offlineCtx.createBufferSource();
  src.buffer = decoded;
  src.connect(offlineCtx.destination);
  src.start(0);
  const rendered = await offlineCtx.startRendering();
  tempCtx.close();
  return audioBufferToWav(rendered);
}
function audioBufferToWav(buffer){
  const samples = buffer.getChannelData(0);
  const sampleRate = buffer.sampleRate;
  const dataSize = samples.length*2;
  const ab = new ArrayBuffer(44+dataSize);
  const view = new DataView(ab);
  function writeStr(off,str){ for(let i=0;i<str.length;i++) view.setUint8(off+i, str.charCodeAt(i)); }
  writeStr(0,'RIFF'); view.setUint32(4,36+dataSize,true); writeStr(8,'WAVE');
  writeStr(12,'fmt '); view.setUint32(16,16,true); view.setUint16(20,1,true);
  view.setUint16(22,1,true); view.setUint32(24,sampleRate,true);
  view.setUint32(28,sampleRate*2,true); view.setUint16(32,2,true); view.setUint16(34,16,true);
  writeStr(36,'data'); view.setUint32(40,dataSize,true);
  let offset=44;
  for(let i=0;i<samples.length;i++){
    let s = Math.max(-1,Math.min(1,samples[i]));
    view.setInt16(offset, s<0? s*0x8000 : s*0x7FFF, true);
    offset+=2;
  }
  return new Blob([ab], {type:'audio/wav'});
}
function blobToBase64(blob){
  return new Promise((resolve,reject)=>{
    const reader = new FileReader();
    reader.onloadend = ()=> resolve(reader.result.split(',')[1]);
    reader.onerror = reject;
    reader.readAsDataURL(blob);
  });
}

// ---------- Analyze (call Gemini) ----------
const statusMsg = document.getElementById('statusMsg');
document.getElementById('analyzeBtn').addEventListener('click', async ()=>{
  const apiKey = apiKeyInput.value.trim();
  if(!apiKey){ alert('Gemini API 키를 먼저 입력하고 저장해주세요.'); return; }

  const activeTab = document.querySelector('.tab-btn.active').dataset.tab;
  let sourceBlob = null;
  let directText = '';
  if(activeTab === 'text'){
    directText = document.getElementById('directTextInput').value.trim();
    if(!directText){ alert('진료 내용을 입력해주세요.'); return; }
  } else if(activeTab === 'upload'){
    const f = document.getElementById('audioFileInput').files[0];
    if(!f){ alert('오디오 파일을 선택해주세요.'); return; }
    sourceBlob = f;
  } else {
    if(!recordedBlob){ alert('먼저 녹음을 해주세요.'); return; }
    sourceBlob = recordedBlob;
  }

  const btn = document.getElementById('analyzeBtn');
  btn.disabled = true;

  try{
    let base64Audio = null;
    if(activeTab !== 'text'){
      statusMsg.textContent = '오디오 변환 중...';
      let wavBlob;
      try{
        wavBlob = await convertToWav(sourceBlob);
      }catch(convErr){
        throw new Error('오디오 파일을 읽을 수 없습니다. 다른 형식(m4a, mp3, wav 등)으로 다시 시도해주세요. (' + convErr.message + ')');
      }
      if(wavBlob.size > 19*1024*1024){
        statusMsg.textContent = '';
        alert('녹음이 너무 깁니다 (약 10분 이상). 더 짧게 나눠서 시도해주세요.');
        btn.disabled = false;
        return;
      }
      base64Audio = await blobToBase64(wavBlob);
    }
    statusMsg.textContent = 'Gemini로 분석 중... (일반적으로 1~2분 정도 걸리고, 녹음이 길수록 더 걸릴 수 있습니다)';

    const prompt = `당신은 한의원 근골격계 진료 내용을 SOAP 노트로 정리하는 어시스턴트입니다.

**가장 중요한 규칙**: 반드시 제공된 실제 오디오(또는 텍스트) 내용만을 근거로 작성하세요. 이 지시문에 포함된 예시(어깨, 허리 등)는 오직 '출력 형식'을 보여주기 위한 것이며, 그 안의 신체 부위·증상·진단명 등 구체적 내용은 절대 결과에 가져오지 마세요. 실제 녹음에서 환자가 무릎을 말했으면 무릎으로, 목을 말했으면 목으로 써야 합니다. 오디오가 잘 안 들리거나 특정 항목을 알 수 없으면, 예시를 베끼지 말고 해당 부분을 빈칸이나 #으로 두세요.

아래는 환자와 한의사 간의 진료 대화입니다 (오디오 또는 텍스트로 제공됨). 반드시 아래 형식과 규칙을 그대로 지켜 작성하세요.
"S)", "O)", "A)" 는 반드시 그 줄에 단독으로 쓰고(뒤에 다른 내용 붙이지 말 것), "[SCRIPT]" 앞뒤에 다른 설명, 인사말, 마크다운 기호(**, ## 등)를 넣지 마세요.
문장 끝에 마침표(.)를 쓰지 마세요. "-" 불렛은 서로 밀접하게 연관된 정보(같은 시간대·같은 동작·같은 상황에 대한 설명)는 쉼표로 이어 한 줄로 묶고, 성격이 다른 정보(예: 시간대별 통증 패턴 / 특정 자세·동작에서의 통증 / 과거 이력 등)로 넘어가면 새 줄로 나누세요. 한 줄이 지나치게 길어져 읽기 어려워질 정도로 여러 상황을 몰아넣지 말고, 구분 가능한 상황·동작 단위로 적절히 줄을 나눠 가독성을 높이세요.
예시: "야간에 통증이 심하고 낮에는 그나마 괜찮음"은 같은 시간대 패턴이므로 한 줄로 묶되, "밤에 어깨가 눌리게 누울 때 가장 심하게 아픔"(특정 자세)과 "팔을 앞이나 옆으로 들어올릴 때 불편함"(특정 동작)은 서로 성격이 다르므로 각각 별도 줄로 나누세요. 즉 연관된 것은 붙이고, 구분되는 상황·자세·동작은 나눠서 한 줄이 너무 길어지지 않게 하세요. 무리하게 한 줄에 다 몰아넣지도, 밀접히 연관된 내용을 억지로 쪼개지도 마세요.
줄을 나누는 기준은 글자 수/분량이 아니라 "주제"입니다. 서로 다른 주제(예: 통증 위치·양상 / 시간대별 패턴 / 과거 이력)마다 새 줄을 만드세요. 결과적으로 주제가 하나면 한 줄, 두 개면 두 줄, 세 개면 세 줄이 되는 식입니다. 억지로 줄 수를 맞추려 하지 말고, 실제 언급된 주제 개수에 따라 자연스럽게 줄 수가 정해지게 하세요.
중복된 표현 없이 간결하게 서술하세요.
C/C는 대표 통증 부위 하나만 한 줄로 쓰세요. 다른 부위의 통증도 언급되면 새로운 C/C 줄을 만들지 말고 아래 "-" 문장 안에서 함께 서술하세요.
"치료 :" 줄과 "S/H :" 줄 사이에는 반드시 빈 줄을 하나 넣으세요.

S)
C/C : [Lt./Rt./양측 등 방향, 좌우 구분이 필요 없는 부위면 생략] [부위 표기] pain (NRS [숫자, 언급 없으면 "#"])
  * 부위 표기 규칙 (아래에 없는 부위는 해당 부위를 영어 단어로 표기, 예: shoulder pain):
    - 허리 통증 → LBP
    - 등 통증 → UBP
    - 목 뒤쪽 통증 → posterior neck pain
    - 목 앞쪽 통증 → anterior neck pain

    const contentParts = [];

    } else {
      // 오디오를 먼저 제시해 모델이 실제 음성을 최우선으로 처리하도록 함
      contentParts.push({text: '아래 오디오는 이번 진료의 실제 녹음입니다. 반드시 이 녹음 내용만을 근거로 작성하세요:'});
      contentParts.push({inline_data: {mime_type:'audio/wav', data: base64Audio}});
      const extraNotes = document.getElementById('extraNotesInput').value.trim();
      if(extraNotes){
        contentParts.push({text: '아래는 녹음에 추가로 의사가 직접 적은 메모입니다. 녹음 내용과 함께 반영하세요:\n' + extraNotes});
      }
      contentParts.push({text: prompt});
    }

    // 과부하/일시적 오류 시 자동 재시도 (최대 4회, 대기시간 점점 늘림)
    const MAX_TRIES = 4;
    let data = null;
    for(let attempt = 1; attempt <= MAX_TRIES; attempt++){
      let resp;
      try{
        resp = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`, {
          method: 'POST',
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify({
            contents: [{ parts: contentParts }],
            generationConfig: { temperature: 0.1, seed: 42 }
          })
        });
      }catch(netErr){
        // 네트워크 자체 실패도 재시도 대상
        if(attempt < MAX_TRIES){
          statusMsg.textContent = `연결이 불안정합니다. 잠시 후 자동으로 다시 시도합니다... (${attempt}/${MAX_TRIES-1})`;
          await new Promise(r => setTimeout(r, attempt * 2500));
          continue;
        }
        throw new Error('네트워크 연결에 실패했습니다. 인터넷 상태를 확인해주세요.');
      }

      data = await resp.json();
      if(resp.ok) break;

      // 과부하(503) / 요청 제한(429) / 일시적 서버 오류(500,502,504)는 재시도
      const retryable = [429, 500, 502, 503, 504].includes(resp.status);
      const isLast = attempt >= MAX_TRIES;
      if(retryable && !isLast){
        const waitSec = attempt * 3;   // 3초 → 6초 → 9초
        statusMsg.textContent = `AI 서버가 잠시 혼잡합니다. ${waitSec}초 후 자동으로 다시 시도합니다... (${attempt}/${MAX_TRIES-1})`;
        await new Promise(r => setTimeout(r, waitSec * 1000));
        continue;
      }
      // 재시도 불가 오류이거나 마지막 시도 실패
      const msg = data.error?.message || '알 수 없는 오류';
      if(retryable){
        throw new Error('AI 서버 혼잡이 계속되고 있습니다. 잠시 후 다시 생성하기를 눌러주세요.\n(원문: ' + msg + ')');
      }
      throw new Error(msg);
    }
    const text = data.candidates?.[0]?.content?.parts?.map(p=>p.text).join('') || '';
    let sMatch = text.split('O)')[0].trim();
    sMatch = sMatch.replace(/([^\n])\nS\/H :/, '$1\n\nS/H :');
    let rest = text.split('O)')[1] || '';
    const oMatch = rest.split('A)')[0].trim();
    rest = rest.split('A)')[1] || '';
    let aMatch = rest.split('[SCRIPT]')[0].trim();
    const scriptMatch = (rest.split('[SCRIPT]')[1] || '').trim();

    const fixedAExplanation = '- 초기 통증 증가 가능성 및 경과에 따라서 추가 검사 필요성 설명함\n- 추정 진단, 치료 계획, 치료에 따른 효과 및 예상되는 부작용에 대해서 설명함';
    aMatch = aMatch ? `${aMatch}\n${fixedAExplanation}` : fixedAExplanation;

    document.getElementById('soaOutput').value = `${sMatch}\n\nO)\n${oMatch}\n\nA)\n${aMatch}`;
    document.getElementById('scriptOutput').value = scriptMatch;

    function fieldBlank(text, label){
      const lines = text.split('\n');
      for(const line of lines){
        const marker = label + ' :';
        const idx = line.indexOf(marker);
        if(idx !== -1){
          return line.slice(idx + marker.length).trim() === '';
        }
      }
      return false;
    }
    const blankFields = [];
    if(fieldBlank(sMatch, 'S/H')) blankFields.push('S/H');
    if(fieldBlank(sMatch, 'P/H')) blankFields.push('P/H');
    if(fieldBlank(sMatch, 'F/H')) blankFields.push('F/H');

    const warnings = [];
    if(/NRS\s*#/.test(sMatch)) warnings.push('⚠️ NRS 점수가 확인되지 않았습니다');
    if(blankFields.length) warnings.push(`⚠️ ${blankFields.join(', ')}이 확인되지 않았습니다`);

    const warnBox = document.getElementById('warnBox');
    warnBox.innerHTML = warnings.map(w=>`<div>${w}</div>`).join('');
    warnBox.style.display = warnings.length ? 'block' : 'none';

    statusMsg.textContent = '완료. 내용을 검수해주세요.';
  }catch(err){
    statusMsg.textContent = '';
    alert('오류가 발생했습니다: ' + err.message);
  }finally{
    document.getElementById('analyzeBtn').disabled = false;
  }

function buildPText(){
  const a0 = acuAreas[0], a1 = acuAreas[1];
  const m0 = a0 ? ACU_MAP[a0] : null, m1 = a1 ? ACU_MAP[a1] : null;
  const parts = [];
  // 투자/관절/척추/복강/간접구 등은 두 부위 중 하나만 사용.
  // 상지부·하지부를 우선으로 하고, 그 부위에 해당 항목이 있으면 그것을, 없으면 다른 부위를 사용.
  function isLimb(area){ return area && (area.indexOf('상지부')===0 || area.indexOf('하지부')===0); }
  // key에 해당하는 값이 있는 부위를 우선순위(상지/하지 먼저)로 골라 반환
  function pickArea(key){
    // 후보를 우선순위대로 정렬: 상지/하지 먼저
    const cands = [];
    if(a0) cands.push({area:a0, m:m0});
    if(a1) cands.push({area:a1, m:m1});
    cands.sort((x,y)=> (isLimb(y.area)?1:0) - (isLimb(x.area)?1:0));
    // 값이 있는 첫 후보
    for(const cd of cands){ if(cd.m && cd.m[key]) return cd; }
    return null;
  }
  if(acuSt.경혈==='경혈2' && m0 && m1) parts.push(`경혈2부위(${m0.경혈} ${m1.경혈})`);
  else if(acuSt.경혈==='경혈1' && m0) parts.push(`경혈1부위(${m0.경혈})`);
  if(acuSt.투자){ const p=pickArea('투자'); if(p) parts.push(`투자(${p.m.투자.join(' ')})`); }
  if(acuSt.관절){ const p=pickArea('관절'); if(p) parts.push(`관절(${p.m.관절})`); }
  if(acuSt.척추){ const p=pickArea('척추'); if(p) parts.push(`척추(${p.m.척추})`); }

// ---------- Combine ----------
document.getElementById('combineBtn').addEventListener('click', ()=>{
  let soa = document.getElementById('soaOutput').value;
  let lines = soa.split('\n');

  // (1) T/A 삽입: S) 블록 안에서, O/S 가 시작되기 직전(C/C 항목들 맨 밑)에 넣음
  const taLine = getTALine();
  if(taLine){
    let sIdx = -1, insertAt = -1;
    for(let i=0;i<lines.length;i++){
      if(lines[i].trim() === 'S)'){ sIdx = i; continue; }
      if(sIdx >= 0){
        const t = lines[i].trim();
        // O/S, S/H, P/H, O) 등 다음 항목이 시작되면 그 직전에 삽입
        if(/^(O\/S|S\/H|P\/H|F\/H)/.test(t) || t === 'O)'){ insertAt = i; break; }
      }
    }
    if(sIdx >= 0){
      if(insertAt === -1) insertAt = lines.length;
      // 삽입 지점 바로 앞의 빈 줄들은 건너뛰어 C/C 내용 바로 밑에 붙임
      let at = insertAt;
      while(at-1 > sIdx && lines[at-1].trim() === '') at--;
      lines.splice(at, 0, taLine);
    }
  }

  // (2) 변증 삽입: A) 블록 맨 아래
  const bijeungLine = getBijeungLine();
  if(bijeungLine){
    let aIdx = -1;
    for(let i=0;i<lines.length;i++){
      if(lines[i].trim() === 'A)'){ aIdx = i; break; }
    }
    if(aIdx >= 0){
      let insertAt = lines.length;
      for(let i=aIdx+1;i<lines.length;i++){
        const t = lines[i].trim();
        if(t === '' || /^[SOAP]\)/.test(t) || t.startsWith('[SCRIPT]')){ insertAt = i; break; }
      }
      lines.splice(insertAt, 0, bijeungLine);
    } else {
      lines.push('', 'A)', bijeungLine);
    }
  }

  soa = lines.join('\n');
  soa = normalizeSectionBreaks(soa);
  const p = buildPText();
  document.getElementById('fullOutput').value = `${soa}\n\n${p}\n\n${chartFooter()}`;
});

// S)/O)/A) 등 구역 헤더 앞에 반드시 빈 줄 하나만 있도록 보정
function normalizeSectionBreaks(text){
  const lines = text.split('\n');
  const headers = new Set(['S)','O)','A)','P)']);
  const out = [];
  for(let i=0;i<lines.length;i++){
    const cur = lines[i].trim();
    if(headers.has(cur) && out.length>0){
      // 직전 줄들의 끝 빈 줄을 정확히 하나로 맞춤
      while(out.length && out[out.length-1].trim()===''){ out.pop(); }
      out.push('');
    }
    out.push(lines[i]);
  }
  return out.join('\n');
}

// 차트 맨 끝 날짜 푸터: ----...---- \n* 7/8
function chartFooter(){
  const now = new Date();
  const md = (now.getMonth()+1) + '/' + now.getDate();
  return '----------------------------------------------------------------------\n* ' + md;
}

document.querySelectorAll('[data-copy]').forEach(btn=>{

  let revertTimer = null;
  btn.addEventListener('click', async ()=>{
    const el = document.getElementById(btn.dataset.copy);
    try{
      await navigator.clipboard.writeText(el.value);
    }catch(e){
      el.select();
      document.execCommand('copy');
    }
    if(revertTimer) clearTimeout(revertTimer);
    btn.textContent = '성공';
    btn.style.background = 'var(--primary)';
    btn.style.color = '#fff';
    revertTimer = setTimeout(()=>{
      btn.textContent = orig;
      btn.style.background = '';
      btn.style.color = '';
      revertTimer = null;
    }, 1200);
  });
});

var PART_ORDER = ['변증','IR','핫팩','전침','이체','경혈','관절','척추','투자','습부','단순','복잡'];
function cqGetPartOrder(p){for(var i=0;i<PART_ORDER.length;i++){if(p.indexOf(PART_ORDER[i])>=0)return i;}return 99;}
function cqSortCombo(c){var p=c.split('+');p.sort(function(a,b){return cqGetPartOrder(a.trim())-cqGetPartOrder(b.trim());});return p.join('+');}
function cqColorPart(p){
  p=p.trim();
  if(p.indexOf('변증')>=0)return '<span style="color:var(--danger);font-weight:700">'+p+'</span>';
  if(p==='IR'||p.indexOf('핫팩')>=0)return '<span style="color:var(--muted)">'+p+'</span>';
  if(p.indexOf('전침')>=0)return '<span style="color:var(--primary-dark);font-weight:600">'+p+'</span>';
  if(p.indexOf('이체')>=0||p.indexOf('경혈')>=0)return '<span style="color:var(--primary);font-weight:700">'+p+'</span>';
  if(p.indexOf('관절')>=0||p.indexOf('척추')>=0||p.indexOf('투자')>=0)return '<span style="color:#5b9bff;font-weight:600">'+p+'</span>';
  if(p.indexOf('습부')>=0)return '<span style="color:#a07840;font-weight:700">'+p+'</span>';
  if(p.indexOf('단순')>=0||p.indexOf('복잡')>=0)return '<span style="color:#2e7d32;font-weight:700">'+p+'</span>';
  return '<span>'+p+'</span>';
}
function cqRenderCombo(c){var parts=cqSortCombo(c).split('+');return parts.map(cqColorPart).join('<span class="cq-combo-sep">+</span>');}

  'RF 시크릿':{'PDRN 1cc':['1회 체험','1회 이벤트','3회'],'PDRN 2cc':['1회 체험','1회 이벤트','3회'],'라디쥬 3cc':['1회 체험','1회 이벤트','3회'],'PLLA':['1회 체험','1회 이벤트','3회'],'엑소좀':['1회 체험','1회 이벤트','3회']},
  '바이오셀':{'바이오셀':['1회','4회','8+1회']},
  '토닝':{'제네시스':['1회 체험','1회 이벤트','10회'],'듀얼':['1회 체험','1회 이벤트','10회']},
  '여드름':{'기본관리':['1회 체험','1회 이벤트','4회','8회','12회'],'스케일링':['1회 체험','1회 이벤트','4회','8회','12회'],'맞춤필링':['1회 체험','1회 이벤트','4회','8회','12회'],'골드PTT':['1회 체험','1회 이벤트','3회']},
  '바디':{'BASIC':['1회 체험','1회 이벤트','5회','10회'],'PLUS':['1회 체험','1회 이벤트','5회','10회']},
  '흉터':{'새살침 1부위':['1회 체험','1회 이벤트']},
  '실리프팅':{'매선 1부위':['1회 체험','1회 이벤트']}
};
// RF 시크릿 → AMTS 변경 토글
var rfAmtsChange=false;
function toggleRfAmts(btn){
  rfAmtsChange=!rfAmtsChange;
  btn.classList.toggle('selected',rfAmtsChange);
}
var skinSelection={};
var PROC_COL1=['슈링크','볼뉴머','볼링크','RF 시크릿','바이오셀'];
var PROC_COL2=['토닝','여드름','바디','흉터','실리프팅'];
function buildProcGroupHTML(containerId,g){
  var map=PROC_GROUPS[g];
  var titleExtra='';
  if(g==='RF 시크릿'){
    titleExtra='<button class="skin-btn suffix rf-amts-btn'+(rfAmtsChange?' selected':'')+'" onclick="toggleRfAmts(this)">AMTS로 변경</button>';
  }
  var html='<div class="skin-group"><div class="skin-group-title" style="display:flex;align-items:center;justify-content:space-between;">'+'<span>'+g+'</span>'+titleExtra+'</div>';
  html+='<div class="skin-btn-row" id="'+containerId+'-'+encodeURIComponent(g)+'-row">';
  Object.keys(map).forEach(function(pre){html+='<button class="skin-btn direct" data-prefix="'+pre+'" onclick="procSelectPrefix(\''+containerId+'\',\''+g+'\',\''+pre.replace(/'/g,"\\'")+'\',this)">'+pre+'</button>';});
  html+='</div>';
  html+='<div id="'+containerId+'-'+encodeURIComponent(g)+'-suffix" class="skin-suffix-row"></div>';
  html+='</div>';
  return html;
}
function buildProcUI(containerId){
  var h='';
  Object.keys(PROC_GROUPS).forEach(function(g){h+=buildProcGroupHTML(containerId,g);});
  document.getElementById(containerId).innerHTML='<div class="skin-grid">'+h+'</div>';
}
function procSelectPrefix(containerId,g,pre,btn){
  var sufWrap=document.getElementById(containerId+'-'+encodeURIComponent(g)+'-suffix');
  // 이미 펼쳐진 대분류를 다시 누르면 닫기
  if(btn.classList.contains('viewing')){
    btn.classList.remove('viewing');
    sufWrap.innerHTML='';
    return;
  }
  Array.prototype.forEach.call(btn.parentNode.querySelectorAll('button.skin-btn'),function(b){b.classList.remove('viewing');});
  btn.classList.add('viewing');
  var suffixes=PROC_GROUPS[g][pre]||[];
  var h='';
  suffixes.forEach(function(suf){
    var label=pre+' '+suf;
    h+='<button class="skin-btn suffix'+(skinSelection[g]===label?' selected':'')+'" data-group="'+g+'" data-label="'+label+'" onclick="procToggleSuffix(this)">'+suf+'</button>';
  });
  sufWrap.innerHTML=h;
}
function procToggleSuffix(btn){
  var group=btn.getAttribute('data-group');
  var label=btn.getAttribute('data-label');
  var nowActive=!btn.classList.contains('selected');
  Array.prototype.forEach.call(document.querySelectorAll('#skin-p-buttons button[data-group="'+group+'"]'),function(b){b.classList.remove('selected');});
  if(nowActive){btn.classList.add('selected');skinSelection[group]=label;}
  else{skinSelection[group]=null;}
}
function skinReset(){
  skinSelection={};
  rfAmtsChange=false;
  buildProcUI('skin-p-buttons');
  document.getElementById('skin-result-area').value='';
}
function skinTodayMD(){var d=new Date();return (d.getMonth()+1)+'/'+d.getDate();}
function skinGenerate(){
  var date=skinTodayMD();
  var lines=[];
  Object.keys(PROC_GROUPS).forEach(function(g){
    if(!skinSelection[g]) return;
    var amts=(g==='RF 시크릿' && rfAmtsChange) ? ' (AMTS로 변경)' : '';
    // 그룹명 앞에 붙이되, prefix가 그룹명과 같으면(바이오셀 등) 중복 제거
    var sel=skinSelection[g];
    var text=(sel.indexOf(g)===0) ? sel : (g+' '+sel);
    lines.push('* '+date+' '+text+amts+' 결제');
  });
  document.getElementById('skin-result-area').value=lines.join('\n');
}
buildProcUI('skin-p-buttons');
renderCQResult();
// 초기엔 접어둠 (헤더만 보이게)
document.querySelector('.cq-card').classList.add('collapsed');

/* ════════════════════════════════════
   전달 탭 (치료실 전달 문구 생성)
════════════════════════════════════ */
var DV_ORDER = ['충격파','추나','추나(환자복)','BC','간접구','습부2','습부1','건부','침(전)','침','약침','I','핫팩','돔','JB'];
var DV_COLORS = {
  'JB':'#7C8FD4','돔':'#5B7C99','핫팩':'#FF6B35','I':'#3B8DCC','약침':'#0052FF',
  '침':'#00C48C','침(전)':'#00C48C',
  '건부':'#88BB00','습부1':'#88BB00','습부2':'#88BB00','간접구':'#D4A574',
  '추나':'#A67C52','추나(환자복)':'#A67C52','충격파':'#1A1D29','BC':'#5B6B81'
};
var DV_FORM = { '핫팩':['부위'], 'I':['부위'], '약침':['종류','cc','개수'] };
var DV_DEFAULT = ['BC','습부2','침(전)','I','핫팩'];
var DV_CHIM_BASES = ['침','침(전)'];
var DV_CHIM_POS = ['앞침','엎침','옆침/좌','옆침/우'];
// 습부1/습부2/건부는 셋 중 하나만
var DV_EXCLUSIVE = ['습부1','습부2','건부'];
var DV_EXCLUSIVE2 = ['침','침(전)'];
var DV_EXCLUSIVE3 = ['추나','추나(환자복)'];
// 예비 버튼 표시 순서 (문장 출력 순서와 별개)
var DV_BTN_ORDER = ['핫팩','돔','JB','I','침','침(전)','약침','간접구','습부2','습부1','건부','BC','추나','추나(환자복)','충격파'];

var dvSeq = 1;
function dvNewId(){ return 'dv'+(dvSeq++)+'-'+Date.now(); }
var dvTreatments = [];

function dvInsertSorted(obj){
  var orderIdx = DV_BTN_ORDER.indexOf(obj.base);
  var insertAt = dvTreatments.length;
  for(var i=0;i<dvTreatments.length;i++){
    if(DV_BTN_ORDER.indexOf(dvTreatments[i].base) > orderIdx){ insertAt = i; break; }
  }
  dvTreatments.splice(insertAt, 0, obj);
}
function dvAdd(base){
  // 배타 그룹(습부1/습부2/건부): 기존 것 제거 후 추가(교체)
  if(DV_EXCLUSIVE.indexOf(base) >= 0){
    dvTreatments = dvTreatments.filter(function(t){ return DV_EXCLUSIVE.indexOf(t.base) < 0; });
  }
  // 배타 그룹(침/침(전)): 하나만
  if(DV_EXCLUSIVE2.indexOf(base) >= 0){
    dvTreatments = dvTreatments.filter(function(t){ return DV_EXCLUSIVE2.indexOf(t.base) < 0; });
  }
  // 배타 그룹(추나/추나(환자복)): 하나만
  if(DV_EXCLUSIVE3.indexOf(base) >= 0){
    dvTreatments = dvTreatments.filter(function(t){ return DV_EXCLUSIVE3.indexOf(t.base) < 0; });
  }
  dvInsertSorted({ id:dvNewId(), base:base, extra:{} });
  dvRender();
}
function dvRemove(id){
  dvTreatments = dvTreatments.filter(function(t){ return t.id !== id; });
  dvRender();
}
function dvInit(){
  dvTreatments = [];
  DV_DEFAULT.forEach(function(name){ dvInsertSorted({ id:dvNewId(), base:name, extra:{} }); });
  dvRender();
}
function dvReset(){
  document.getElementById('deliver-name').value = '';
  document.getElementById('deliver-region').value = '';
  document.getElementById('deliver-result').value = '';
  dvInit();
}
function deliverReset(){ dvReset(); }

function dvTreatmentLabel(t){
  if(DV_CHIM_BASES.indexOf(t.base) >= 0 && t.extra && t.extra['자세']){
    return t.extra['자세'] + (t.base === '침(전)' ? '(전)' : '');
  }
  return t.base;
}

// 칩 드래그로 순서 변경
var dvDrag = null;
function dvAttachDrag(chip, id){
  chip.dataset.id = id;
  chip.style.touchAction = 'none';
  chip.addEventListener('pointerdown', function(e){
    if(e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT' || e.target.closest('.dv-del')) return;
    e.preventDefault();
    var startX = e.clientX, startY = e.clientY, started = false;
    function onMove(ev){
      if(!started && (Math.abs(ev.clientX-startX)>6 || Math.abs(ev.clientY-startY)>6)){
        started = true;
        dvDrag = { id: id };
        chip.classList.add('dv-dragging');
      }
    }
    function onUp(ev){
      document.removeEventListener('pointermove', onMove);
      document.removeEventListener('pointerup', onUp);
      chip.classList.remove('dv-dragging');
      if(started && dvDrag){
        var el = document.elementFromPoint(ev.clientX, ev.clientY);
        var targetChip = el && el.closest('#deliver-chips [data-id]');
        if(targetChip && targetChip.dataset.id !== dvDrag.id){
          var rect = targetChip.getBoundingClientRect();
          var insertBefore = (ev.clientX - rect.left) < rect.width/2;
          dvReorder(dvDrag.id, targetChip.dataset.id, insertBefore);
        }
      }
      dvDrag = null;
    }
    document.addEventListener('pointermove', onMove);
    document.addEventListener('pointerup', onUp);
  });
}
function dvReorder(draggedId, targetId, insertBefore){
  var idx = dvTreatments.findIndex(function(t){ return t.id === draggedId; });
  if(idx === -1) return;
  var obj = dvTreatments.splice(idx, 1)[0];
  var targetIdx = dvTreatments.findIndex(function(t){ return t.id === targetId; });
  var insertAt = insertBefore ? targetIdx : targetIdx + 1;
  dvTreatments.splice(Math.max(0, insertAt), 0, obj);
  dvRender();
}

function dvRender(){
  var chipsBox = document.getElementById('deliver-chips');
  var btnsBox = document.getElementById('deliver-btns');
  if(!chipsBox || !btnsBox) return;
  chipsBox.innerHTML = '';
  btnsBox.innerHTML = '';

  dvTreatments.forEach(function(t){
    var color = DV_COLORS[t.base] || '#0052FF';
    var fields = DV_FORM[t.base];
    if(fields){
      var chip = document.createElement('div');
      chip.className = 'dv-chip-split';
      chip.style.setProperty('--dvcolor', color);
      var label = document.createElement('div');
      label.className = 'dv-label'; label.textContent = t.base;
      chip.appendChild(label);
      fields.forEach(function(f){
        var inp = document.createElement('input');
        inp.placeholder = f;
        inp.value = t.extra[f] || '';
        inp.addEventListener('input', function(e){ t.extra[f] = e.target.value; });
        chip.appendChild(inp);
      });
      var del = document.createElement('div');
      del.className = 'dv-del'; del.textContent = '✕';
      del.addEventListener('click', function(){ dvRemove(t.id); });
      chip.appendChild(del);
      dvAttachDrag(chip, t.id);
      chipsBox.appendChild(chip);
    } else if(DV_CHIM_BASES.indexOf(t.base) >= 0){
      var chip2 = document.createElement('div');
      chip2.className = 'dv-chip-split';
      chip2.style.setProperty('--dvcolor', color);
      var label2 = document.createElement('div');
      label2.className = 'dv-label'; label2.textContent = t.base;
      chip2.appendChild(label2);
      var sel = document.createElement('select');
      var optD = document.createElement('option');
      optD.value = ''; optD.textContent = '자세';
      sel.appendChild(optD);
      DV_CHIM_POS.forEach(function(p){
        var o = document.createElement('option'); o.value = p; o.textContent = p;
        sel.appendChild(o);
      });
      if(!t.extra) t.extra = {};
      sel.value = t.extra['자세'] || '';
      sel.addEventListener('change', function(e){ t.extra['자세'] = e.target.value; });
      chip2.appendChild(sel);
      var del2 = document.createElement('div');
      del2.className = 'dv-del'; del2.textContent = '✕';
      del2.addEventListener('click', function(){ dvRemove(t.id); });
      chip2.appendChild(del2);
      dvAttachDrag(chip2, t.id);
      chipsBox.appendChild(chip2);
    } else {
      var chip3 = document.createElement('div');
      chip3.className = 'dv-chip';
      chip3.style.setProperty('--dvcolor', color);
      var sp = document.createElement('span'); sp.textContent = t.base;
      chip3.appendChild(sp);
      var del3 = document.createElement('span');
      del3.className = 'dv-del'; del3.textContent = '✕';
      del3.addEventListener('click', function(){ dvRemove(t.id); });
      chip3.appendChild(del3);
      dvAttachDrag(chip3, t.id);
      chipsBox.appendChild(chip3);
    }
  });

  // 아직 추가 안 된 시술 버튼
  var added = {};
  dvTreatments.forEach(function(t){ added[t.base] = true; });
  DV_BTN_ORDER.forEach(function(name){
    if(name === '습부1'){
      var brk = document.createElement('div');
      brk.style.flexBasis = '100%';
      brk.style.height = '0';
      btnsBox.appendChild(brk);
    }
    if(added[name]) return;
    var btn = document.createElement('button');
    btn.className = 'dv-btn';
    btn.style.setProperty('--dvcolor', DV_COLORS[name] || '#0052FF');
    btn.textContent = name;
    btn.addEventListener('click', function(){ dvAdd(name); });
    btnsBox.appendChild(btn);
  });
}

var DV_OUTPUT_ORDER = DV_ORDER.slice().reverse();  // 핫팩부터
function dvBuildSummary(){
  var region = document.getElementById('deliver-region').value.trim();
  // 드래그로 바꾼 순서(dvTreatments 배열 순서)를 그대로 사용
  var treatments = dvTreatments.slice();
  var yakIdx = treatments.findIndex(function(t){ return t.base === '약침'; });
  var chimIdx = treatments.findIndex(function(t){ return t.base === '침(전)'; });
  var out = [];
  for(var i=0;i<treatments.length;i++){
    if(i === yakIdx && chimIdx > -1) continue;
    var t = treatments[i];
    if(i === chimIdx && yakIdx > -1){
      var yak = treatments[yakIdx];
      var kind = yak.extra['종류'] || '';
      var cc = yak.extra['cc'] || '';
      var count = yak.extra['개수'] || '';
      var detail = kind;
      if(cc || count) detail += '('+cc+'cc*'+count+')';
      out.push(dvTreatmentLabel(t) + '+' + detail);
      continue;
    }
    if(t.base === 'I'){
      var vI = (t.extra['부위'] && t.extra['부위'].trim()) ? t.extra['부위'].trim() : '';
      out.push('I' + (vI ? '('+vI+')' : ''));
      continue;
    }
    if(t.base === '핫팩'){
      var vH = t.extra['부위'] || '';
      out.push('HP' + (vH ? '('+vH+')' : ''));
      continue;
    }
    var fields = DV_FORM[t.base];
    if(fields){
      var vals = fields.map(function(f){ return t.extra[f]; }).filter(function(v){ return v; });
      out.push(t.base + (vals.length ? '('+vals.join('/')+')' : ''));
    } else {
      out.push(dvTreatmentLabel(t));
    }
  }
  return out.map(function(s,i){ return (i+1)+s; }).join(' ');
}

function deliverCopy(){
  var name = document.getElementById('deliver-name').value.trim();
  var region = document.getElementById('deliver-region').value.trim();
  var summary = dvBuildSummary();
  var prefix = [name, region].filter(function(v){ return v; }).join(' ');
  var text = (prefix ? prefix + ' ' : '') + summary;
  document.getElementById('deliver-result').value = text;
  var el = document.getElementById('deliver-result');
  if(navigator.clipboard && window.isSecureContext){
    navigator.clipboard.writeText(text).then(function(){ showToastDv('복사되었습니다'); }).catch(function(){ dvFallbackCopy(el); });
  } else {
    dvFallbackCopy(el);
  }
}
function dvFallbackCopy(el){
  el.removeAttribute('readonly');
  el.select(); el.setSelectionRange(0,99999);
  try{ document.execCommand('copy'); showToastDv('복사되었습니다'); }
  catch(e){ showToastDv('복사 실패 — 직접 선택 후 복사하세요'); }
  el.setAttribute('readonly','');
}
function showToastDv(msg){
  if(typeof showToast === 'function'){ showToast(msg); return; }
  alert(msg);
}

dvInit();
var _dvCard = document.getElementById('deliver-card');
if(_dvCard) _dvCard.classList.add('collapsed');
